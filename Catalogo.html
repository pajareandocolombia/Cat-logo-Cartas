<div id="app"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwFCrd7lEQbwHenHKURszfoVej8JWFl5tREYdAQx6bxBwWYJOC2n-G40LfmR_nOjK4/exec
";

async function load(){

  const data = await fetch(API_URL).then(r=>r.json());

  const container = document.getElementById("app");

  const disponibles = data.filter(c => c.available === true || c.available === "TRUE");

  container.innerHTML = `
    <style>
    body{font-family:Arial}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:15px;
    }
    .card{
      text-align:center;
      padding:10px;
      border-radius:10px;
      background:#f1f5f9;
    }
    .card img{
      width:100%;
      cursor:pointer;
      border-radius:8px;
    }
    </style>

    <div class="grid">
      ${
        disponibles.map(c=>`
          <div class="card">
            <img src="${c.small}" onclick="openImg('${c.large}')">
            <h4>${c.name}</h4>
            <p>${c.rarity}</p>
          </div>
        `).join("")
      }
    </div>

    <div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;justify-content:center;align-items:center;">
      <img id="modalImg" style="max-height:90%">
    </div>
  `;
}

function openImg(src){
  modal.style.display="flex";
  modalImg.src = src;
}

document.addEventListener("click", e=>{
  if(e.target.id==="modal"){
    modal.style.display="none";
  }
});

load();
</script>
