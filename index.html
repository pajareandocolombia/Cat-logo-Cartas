<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
}

h1{text-align:center;}

.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:20px;
  flex-wrap:wrap;
}

input, select{
  padding:8px;
  border-radius:6px;
  border:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

.price{
  color:#22c55e;
  font-weight:bold;
}

button{
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.cart{
  position:fixed;
  top:10px;
  right:10px;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<h1>Tienda Pokémon PRO</h1>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar carta...">
  <select id="setFilter">
    <option value="">Todas las colecciones</option>
  </select>
</div>

<div class="cart">
  🛒 <span id="cartCount">0</span>
  <button onclick="checkout()">Comprar</button>
</div>

<div class="grid" id="grid"></div>

<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;justify-content:center;align-items:center;">
<img id="modalImg" style="max-height:90%">
</div>

<script>

const API_BASE = "https://api.pokemontcg.io/v2";

let allCards = [];
let cart = JSON.parse(localStorage.getItem("cart") || "[]");
let prices = JSON.parse(localStorage.getItem("prices") || "{}");

updateCartUI();

function formatPrice(v){
  return new Intl.NumberFormat('es-CO',{
    style:'currency',
    currency:'COP',
    minimumFractionDigits:0
  }).format(v);
}

async function loadSets(){
  const res = await fetch(API_BASE + "/sets");
  const json = await res.json();

  const select = document.getElementById("setFilter");

  json.data.forEach(s=>{
    const option = document.createElement("option");
    option.value = s.id;
    option.textContent = s.name;
    select.appendChild(option);
  });
}

async function loadCards(setId=""){
  
  let url = API_BASE + "/cards?pageSize=40";

  if(setId){
    url += `&q=set.id:${setId}`;
  }

  const res = await fetch(url);
  const json = await res.json();

  allCards = json.data;

  renderCards();
}

function renderCards(){

  const search = document.getElementById("search").value.toLowerCase();
  const grid = document.getElementById("grid");

  const filtered = allCards.filter(c =>
    c.name.toLowerCase().includes(search)
  );

  grid.innerHTML = filtered.map(c=>{

    const price = prices[c.id] || 0;

    return `
    <div class="card">
      <img src="${c.images.small}" onclick="openImg('${c.images.large}')">
      <h4>${c.name}</h4>
      <p>${c.rarity || "N/A"}</p>

      <input type="number" placeholder="Precio" value="${price}"
        onchange="setPrice('${c.id}', this.value)">

      <div class="price">${price ? formatPrice(price) : ""}</div>

      <button onclick="addToCart('${c.id}','${c.name}',${price})">
        Agregar
      </button>
    </div>
    `;
  }).join("");

}

function setPrice(id, value){
  prices[id] = Number(value);
  localStorage.setItem("prices", JSON.stringify(prices));
  renderCards();
}

function addToCart(id,name,price){

  if(!price){
    alert("Pon un precio primero");
    return;
  }

  cart.push({id,name,price});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartUI();
}

function updateCartUI(){
  document.getElementById("cartCount").textContent = cart.length;
}

function checkout(){

  if(cart.length === 0){
    alert("Carrito vacío");
    return;
  }

  let msg = "Hola, quiero comprar:\n";

  cart.forEach(c=>{
    msg += `- ${c.name} ${formatPrice(c.price)}\n`;
  });

  const url = "https://wa.me/573001234567" + encodeURIComponent(msg);

  window.open(url, "_blank");
}

function openImg(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src = src;
}

document.getElementById("search").addEventListener("input", renderCards);

document.getElementById("setFilter").addEventListener("change", (e)=>{
  loadCards(e.target.value);
});

document.addEventListener("click",e=>{
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
  }
});

document.addEventListener("DOMContentLoaded", async ()=>{
  await loadSets();
  await loadCards();
});

</script>

</body>
</html>
