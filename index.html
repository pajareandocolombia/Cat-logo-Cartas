<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V8.4 FIX</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{background:#1e3a8a;padding:10px;display:flex;justify-content:space-between;}
.admin-btn{background:#f59e0b;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;}
.search{padding:10px;background:#111827;}
.search input{width:100%;padding:8px;border-radius:6px;border:none;}
.container{display:flex;}
.sets{width:220px;height:100vh;overflow:auto;background:#111827;padding:8px;}
.set{background:#1e293b;padding:6px;margin-bottom:6px;border-radius:6px;cursor:pointer;font-size:12px;}
.main{flex:1;padding:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.card{background:#1e293b;padding:8px;border-radius:10px;}
.card img{width:100%;}
button{width:100%;margin-top:5px;padding:6px;border:none;border-radius:6px;background:#22c55e;color:white;}
.global-btn{width:100%;padding:8px;margin-bottom:10px;background:#3b82f6;border:none;border-radius:6px;color:white;}

#adminPanel{
position:fixed;top:0;right:-400px;width:400px;height:100%;
background:#020617;overflow:auto;padding:10px;transition:0.3s;
}
</style>
</head>

<body>

<header>
  <div>🃏 Tienda Pokémon PRO V8.4 FIX</div>
  <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</header>

<div class="search">
  <input id="search" placeholder="Buscar carta..." oninput="searchCards()">
</div>

<div class="container">

<div class="sets" id="sets">
  <button class="global-btn" onclick="loadAllStock()">🟢 Ver todo el stock</button>
</div>

<div class="main">
  <h3 id="title">Cargando...</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<div id="adminPanel">
  <h2>🛠️ Panel Admin</h2>
  <select id="adminSet" onchange="loadAdminSet()" style="width:100%;margin-bottom:10px;"></select>
  <div id="adminCards"></div>
</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_SET_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

let inventory = {};
let setsData = [];
let allCards = [];

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {

  inventory = JSON.parse(localStorage.getItem("inventory")) || {};

  await loadSets();

  loadAllStock();
});

/* ================= ADMIN ================= */
function loginAdmin(){
  const pass = prompt("Contraseña admin:");
  if(pass === "1234"){
    document.getElementById("adminPanel").style.right = "0px";
    loadAdminSets();
  }
}

/* ================= LOAD SETS ================= */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  setsData = json.data.sort((a,b)=>
    new Date(b.releaseDate) - new Date(a.releaseDate)
  );

  const box = document.getElementById("sets");

  setsData.forEach(s=>{
    const div = document.createElement("div");
    div.className = "set";

    div.innerHTML = `<div>${s.name}</div>`;

    div.onclick = ()=> loadSet(s.id, s.name);

    box.appendChild(div);
  });
}

/* ================= 🔥 FIX REAL ================= */
async function loadAllStock(){

  document.getElementById("title").innerText =
    "Todas las cartas en stock";

  inventory = JSON.parse(localStorage.getItem("inventory")) || {};

  let grouped = {};
  allCards = [];

  // 🔥 recorrer TODAS las colecciones cargadas
  for(const s of setsData){

    try{

      const res = await fetch(API_SET_CARDS + s.id);
      const json = await res.json();

      const cards = json.data.filter(c => inventory[c.id]?.stock);

      if(cards.length === 0) continue;

      grouped[s.name] = {
        date: s.releaseDate,
        cards: []
      };

      cards.forEach(c=>{

        const item = {
          id: c.id,
          name: c.name,
          img: c.images.small,
          qty: inventory[c.id]?.qty || 1
        };

        grouped[s.name].cards.push(item);
        allCards.push(item);
      });

    } catch(e){
      console.log("Error cargando set:", s.name);
    }
  }

  // 🔥 ordenar colecciones por fecha (más nuevas primero)
  let ordered = Object.keys(grouped).map(k=>({
    name: k,
    date: grouped[k].date,
    cards: grouped[k].cards
  }));

  ordered.sort((a,b)=>
    new Date(b.date) - new Date(a.date)
  );

  renderGrouped(ordered);
}

/* ================= RENDER ================= */
function renderGrouped(sets){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  if(sets.length === 0){
    grid.innerHTML = "<h3>No hay cartas en stock</h3>";
    return;
  }

  sets.forEach(set=>{

    grid.innerHTML += `
      <h3 style="grid-column:1/-1">${set.name}</h3>
    `;

    set.cards.forEach(c=>{
      grid.innerHTML += `
        <div class="card">
          <img src="${c.img}">
          <div>${c.name}</div>
          <div>Stock: ${c.qty}</div>
          <button onclick="buy('${c.name}')">Comprar</button>
        </div>
      `;
    });
  });
}

/* ================= FILTER SET ================= */
async function loadSet(id,name){

  document.getElementById("title").innerText = name;

  const res = await fetch(API_SET_CARDS + id);
  const json = await res.json();

  const filtered = json.data
    .filter(c => inventory[c.id]?.stock)
    .map(c=>({
      name:c.name,
      img:c.images.small,
      qty:inventory[c.id].qty
    }));

  render(filtered);
}

/* ================= SEARCH ================= */
function searchCards(){

  const q = document.getElementById("search").value.toLowerCase();

  if(!q){
    loadAllStock();
    return;
  }

  const matches = allCards.filter(c=>
    c.name.toLowerCase().includes(q)
  );

  render(matches);
}

function render(cards){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cards.forEach(c=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${c.img}">
        <div>${c.name}</div>
        <div>Stock: ${c.qty}</div>
      </div>
    `;
  });
}

/* ================= ADMIN ================= */
async function loadAdminSets(){

  document.getElementById("adminSet").innerHTML =
    setsData.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");

  loadAdminSet();
}

async function loadAdminSet(){

  const setId = document.getElementById("adminSet").value;

  const res = await fetch(API_SET_CARDS + setId);
  const json = await res.json();

  const box = document.getElementById("adminCards");
  box.innerHTML = "";

  json.data.forEach(c=>{

    const inv = inventory[c.id] || {stock:false, qty:1};

    box.innerHTML += `
      <div style="margin-bottom:8px;">
        <img src="${c.images.small}" width="80">
        <div>${c.name}</div>

        <input type="checkbox"
          ${inv.stock ? "checked":""}
          onchange="toggleStock('${c.id}')"> Stock

        <input type="number" value="${inv.qty}"
          onchange="changeQty('${c.id}',this.value)">
      </div>
    `;
  });
}

function toggleStock(id){
  if(!inventory[id]) inventory[id]={stock:false,qty:1};
  inventory[id].stock=!inventory[id].stock;
  save();
}

function changeQty(id,q){
  if(!inventory[id]) inventory[id]={stock:true,qty:1};
  inventory[id].qty=parseInt(q)||1;
  save();
}

function save(){
  localStorage.setItem("inventory", JSON.stringify(inventory));
  loadAllStock();
}

/* ================= BUY ================= */
function buy(name){
  window.open("https://wa.me/57TU_NUMERO?text="+encodeURIComponent(name));
}

</script>

</body>
</html>
