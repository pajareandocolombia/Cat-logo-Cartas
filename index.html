<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V7.3</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{
  background:#1e3a8a;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.search{padding:10px;background:#111827;position:relative;}
.search input{width:100%;padding:8px;border-radius:6px;border:none;}
.suggestions{
  position:absolute;top:45px;left:10px;right:10px;
  background:#1e293b;max-height:200px;overflow:auto;
}
.container{display:flex;}
.sets{
  width:220px;height:100vh;overflow:auto;
  background:#111827;padding:8px;
}
.set{background:#1e293b;padding:6px;margin-bottom:6px;border-radius:6px;cursor:pointer;font-size:12px;}
.set img{width:100%;}
.main{flex:1;padding:10px;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}
.card{background:#1e293b;padding:8px;border-radius:10px;}
.card img{width:100%;}
button{
  width:100%;margin-top:5px;padding:6px;border:none;
  border-radius:6px;background:#22c55e;color:white;
}
.global-btn{
  width:100%;padding:8px;margin-bottom:10px;
  background:#3b82f6;border:none;border-radius:6px;color:white;
}
.admin-btn{
  background:#f59e0b;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>🃏 Tienda Pokémon PRO V7.3</div>
  <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</header>

<div class="search">
  <input id="search" placeholder="Buscar carta..." oninput="searchCards()">
  <div id="suggestions" class="suggestions"></div>
</div>

<div class="container">

<div class="sets" id="sets">
  <button class="global-btn" onclick="loadAllStock()">🟢 Ver todo el stock</button>
</div>

<div class="main">
  <h3 id="title">Cargando...</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARD = "https://api.pokemontcg.io/v2/cards/";

let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let allCards = [];
let loadedCards = {}; // cache por ID

/* ======================
   🔐 ADMIN LOGIN
====================== */
function loginAdmin(){

  const pass = prompt("Contraseña admin:");

  if(pass === "1234"){
    alert("Modo admin activado");
    console.log("ADMIN MODE");
  }else{
    alert("Acceso denegado");
  }
}

/* ======================
   LOAD SET MENU
====================== */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  const sets = json.data.sort((a,b)=>
    new Date(b.releaseDate) - new Date(a.releaseDate)
  );

  const box = document.getElementById("sets");

  sets.forEach(s=>{

    const div = document.createElement("div");
    div.className = "set";

    div.innerHTML = `
      <img src="${s.images.logo}">
      <div>${s.name}</div>
    `;

    div.onclick = ()=> loadSet(s.id, s.name);

    box.appendChild(div);
  });
}

/* ======================
   🔥 LOAD STOCK REAL
====================== */
async function loadAllStock(){

  document.getElementById("title").innerText =
    "Todas las cartas en stock";

  let cards = [];

  const ids = Object.keys(inventory);

  // 🔥 SI HAY INVENTARIO → cargar SOLO esas cartas
  if(ids.length > 0){

    for(const id of ids){

      if(!loadedCards[id]){
        const res = await fetch(API_CARD + id);
        const json = await res.json();
        loadedCards[id] = json.data;
      }

      const c = loadedCards[id];
      const inv = inventory[id];

      if(inv.stock && inv.qty > 0){

        cards.push({
          id:c.id,
          name:c.name,
          img:c.images.small,
          set:c.set.name,
          qty:inv.qty
        });
      }
    }

  }else{
    // modo demo
    const res = await fetch(API_SETS);
    const sets = await res.json();

    const first = sets.data[0];

    const r = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${first.id}`);
    const j = await r.json();

    cards = j.data.slice(0,20).map(c=>({
      id:c.id,
      name:c.name,
      img:c.images.small,
      set:first.name,
      qty:1
    }));
  }

  allCards = cards;

  renderGrouped(cards);
}

/* ======================
   RENDER GROUPED
====================== */
function renderGrouped(cards){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const grouped = {};

  cards.forEach(c=>{
    if(!grouped[c.set]) grouped[c.set] = [];
    grouped[c.set].push(c);
  });

  Object.keys(grouped).forEach(set=>{

    grid.innerHTML += `<h3 style="grid-column:1/-1">${set}</h3>`;

    grouped[set].forEach(c=>{

      grid.innerHTML += `
        <div class="card">
          <img src="${c.img}">
          <div>${c.name}</div>
          <div>Stock: ${c.qty}</div>
          <button onclick="buy('${c.name}')">Comprar</button>
        </div>
      `;
    });
  });
}

/* ======================
   LOAD SET
====================== */
async function loadSet(setId, name){

  document.getElementById("title").innerText = name;

  const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${setId}`);
  const json = await res.json();

  const filtered = json.data
    .filter(c => inventory[c.id]?.stock)
    .map(c=>({
      id:c.id,
      name:c.name,
      img:c.images.small,
      qty:inventory[c.id]?.qty || 1
    }));

  render(filtered);
}

/* ======================
   RENDER
====================== */
function render(cards){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cards.forEach(c=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${c.img}">
        <div>${c.name}</div>
        <div>Stock: ${c.qty}</div>
        <button onclick="buy('${c.name}')">Comprar</button>
      </div>
    `;
  });
}

/* ======================
   SEARCH
====================== */
function searchCards(){

  const q = document.getElementById("search").value.toLowerCase();
  const box = document.getElementById("suggestions");

  if(q.length === 0){
    box.innerHTML = "";
    loadAllStock();
    return;
  }

  const matches = allCards.filter(c=>
    c.name.toLowerCase().includes(q)
  );

  box.innerHTML = matches.slice(0,8).map(m=>
    `<div onclick="selectSearch('${m.name}')">${m.name}</div>`
  ).join("");

  render(matches);
}

function selectSearch(name){

  document.getElementById("search").value = "";
  document.getElementById("suggestions").innerHTML = "";

  const filtered = allCards.filter(c=>c.name === name);
  render(filtered);
}

/* ====================== */
function buy(name){
  window.open(
    "https://wa.me/57TU_NUMERO?text=Quiero%20la%20carta%20"+encodeURIComponent(name)
  );
}

/* INIT */
loadSets();
loadAllStock();

</script>

</body>
</html>
