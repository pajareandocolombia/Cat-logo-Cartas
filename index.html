<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda PRO v3.1</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:#1e3a8a;
  padding:12px;
  text-align:center;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SIDEBAR (COLLECTIONS COMPACTA) */
.sets{
  width:200px;
  height:100vh;
  overflow:auto;
  background:#111827;
  padding:8px;
  transition:0.3s;
}

.set{
  background:#1e293b;
  padding:6px;
  margin-bottom:6px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.set img{
  width:100%;
  border-radius:4px;
}

/* MAIN */
.main{
  flex:1;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
  font-size:13px;
}

.card img{
  width:100%;
}

/* STOCK BUTTONS */
button{
  width:100%;
  margin-top:5px;
  padding:5px;
  cursor:pointer;
}

/* ADMIN MODE */
.admin{
  border:2px solid #f59e0b;
}

/* TOGGLE PANEL */
.toggle{
  background:#111827;
  padding:5px;
  text-align:center;
  cursor:pointer;
  font-size:12px;
  border-bottom:1px solid #334155;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<header>
🧩 Pokémon TCG PRO v3.1
</header>

<div class="container">

<!-- SIDEBAR COLLECTIONS -->
<div class="sets" id="sets">
  <div class="toggle" onclick="toggleSets()">📂 Colecciones</div>
</div>

<!-- MAIN -->
<div class="main">
  <h3 id="title">Selecciona una colección</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

let admin = false;
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let setsVisible = true;

/* ADMIN LOGIN */
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.shiftKey && e.key==="A"){
    let pass = prompt("Admin password:");
    if(pass==="1234"){
      admin = true;
      alert("Admin activado");
    }
  }
});

/* TOGGLE SIDEBAR */
function toggleSets(){
  const box = document.getElementById("sets");
  setsVisible = !setsVisible;
  box.style.width = setsVisible ? "200px" : "40px";
}

/* LOAD SETS */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  const box = document.getElementById("sets");

  json.data.forEach(s=>{

    const div = document.createElement("div");
    div.className = "set";

    div.innerHTML = `
      <img src="${s.images.logo}">
      <div>${s.name}</div>
    `;

    div.onclick = ()=> loadCards(s.id, s.name);

    box.appendChild(div);
  });
}

/* LOAD CARDS */
async function loadCards(setId, name){

  document.getElementById("title").innerText = name;

  const res = await fetch(API_CARDS + setId);
  const json = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  json.data.forEach(c=>{

    if(!inventory[c.id]){
      inventory[c.id] = {
        stock:false,
        qty:0
      };
    }

    const item = inventory[c.id];

    grid.innerHTML += `
      <div class="card ${admin ? "admin":""}">
        <img src="${c.images.small}">
        <div>${c.name}</div>
        <div>Stock: ${item.stock ? item.qty : 0}</div>

        ${admin ? `
          <button onclick="toggleStock('${c.id}')">
            ${item.stock ? "❌ Desactivar" : "✔ Activar"}
          </button>

          <button onclick="addQty('${c.id}')">+ Stock</button>
          <button onclick="removeQty('${c.id}')">- Stock</button>
        ` : ""}
      </div>
    `;
  });

  save();
}

/* STOCK CONTROL */
function toggleStock(id){
  inventory[id].stock = !inventory[id].stock;

  if(inventory[id].stock && inventory[id].qty === 0){
    inventory[id].qty = 1;
  }

  save();
  reload();
}

function addQty(id){
  inventory[id].qty++;
  save();
  reload();
}

function removeQty(id){
  if(inventory[id].qty > 0){
    inventory[id].qty--;
  }

  if(inventory[id].qty === 0){
    inventory[id].stock = false;
  }

  save();
  reload();
}

/* SAVE */
function save(){
  localStorage.setItem("inventory", JSON.stringify(inventory));
}

/* RELOAD */
function reload(){
  location.reload();
}

/* INIT */
loadSets();

</script>

</body>
</html>
