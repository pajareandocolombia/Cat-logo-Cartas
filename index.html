<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V7</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:#1e3a8a;
  padding:10px;
  text-align:center;
}

/* SEARCH */
.search{
  display:flex;
  padding:10px;
  background:#111827;
  position:relative;
}

.search input{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
}

/* AUTOCOMPLETE */
.suggestions{
  position:absolute;
  top:45px;
  left:10px;
  right:10px;
  background:#1e293b;
  z-index:1000;
  max-height:200px;
  overflow:auto;
}

.suggestions div{
  padding:8px;
  cursor:pointer;
}

.suggestions div:hover{
  background:#334155;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SIDEBAR */
.sets{
  width:220px;
  height:100vh;
  overflow:auto;
  background:#111827;
  padding:8px;
}

.set{
  background:#1e293b;
  padding:6px;
  margin-bottom:6px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.set img{
  width:100%;
  border-radius:4px;
}

/* MAIN */
.main{
  flex:1;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
}

.card img{
  width:100%;
  border-radius:6px;
}

button{
  width:100%;
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#22c55e;
  color:white;
}

/* GLOBAL BUTTON */
.global-btn{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  background:#3b82f6;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
🃏 Pokémon TCG PRO V7 — Final Stable
</header>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Buscar carta..." oninput="searchCards()">
  <div id="suggestions" class="suggestions"></div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sets" id="sets">
  <button class="global-btn" onclick="loadAllStock()">
    🟢 Ver todo el stock
  </button>
</div>

<!-- MAIN -->
<div class="main">
  <h3 id="title">Cargando...</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

/* STATE */
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let allCards = [];
let currentSet = null;
let viewMode = "all";

/* ======================
   LOAD SETS
====================== */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  const sets = json.data.sort((a,b)=>
    new Date(b.releaseDate) - new Date(a.releaseDate)
  );

  const box = document.getElementById("sets");

  sets.forEach(s=>{

    const div = document.createElement("div");
    div.className = "set";

    div.innerHTML = `
      <img src="${s.images.logo}">
      <div>${s.name}</div>
    `;

    div.onclick = ()=> loadSet(s.id, s.name);

    box.appendChild(div);
  });
}

/* ======================
   GLOBAL STOCK VIEW
====================== */
async function loadAllStock(){

  viewMode = "all";
  currentSet = null;

  document.getElementById("title").innerText =
    "Todas las cartas en stock";

  const resSets = await fetch(API_SETS);
  const sets = await resSets.json();

  let cards = [];

  const ordered = sets.data.sort((a,b)=>
    new Date(b.releaseDate) - new Date(a.releaseDate)
  );

  for(const s of ordered){

    const res = await fetch(API_CARDS + s.id);
    const json = await res.json();

    json.data.forEach(c=>{

      const inv = inventory[c.id];

      if(inv && inv.stock && inv.qty > 0){

        cards.push({
          id:c.id,
          name:c.name,
          img:c.images.small,
          set:s.name,
          qty:inv.qty
        });
      }
    });
  }

  allCards = cards;

  renderGrouped(cards);
}

/* ======================
   GROUP VIEW
====================== */
function renderGrouped(cards){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const grouped = {};

  cards.forEach(c=>{
    if(!grouped[c.set]) grouped[c.set] = [];
    grouped[c.set].push(c);
  });

  Object.keys(grouped).forEach(set=>{

    grid.innerHTML += `<h3 style="grid-column:1/-1">${set}</h3>`;

    grouped[set].forEach(c=>{

      grid.innerHTML += `
        <div class="card">
          <img src="${c.img}">
          <div>${c.name}</div>
          <div>Stock: ${c.qty}</div>

          <button onclick="buy('${c.name}')">
            Comprar
          </button>
        </div>
      `;
    });
  });
}

/* ======================
   FILTER BY SET
====================== */
async function loadSet(setId, name){

  viewMode = "set";
  currentSet = setId;

  document.getElementById("title").innerText = name;

  const res = await fetch(API_CARDS + setId);
  const json = await res.json();

  const filtered = json.data
    .filter(c=>{
      const inv = inventory[c.id];
      return inv && inv.stock && inv.qty > 0;
    })
    .map(c=>({
      id:c.id,
      name:c.name,
      img:c.images.small,
      qty:inventory[c.id].qty,
      set:name
    }));

  render(filtered);
}

/* ======================
   SIMPLE RENDER
====================== */
function render(cards){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cards.forEach(c=>{

    grid.innerHTML += `
      <div class="card">
        <img src="${c.img}">
        <div>${c.name}</div>
        <div>Stock: ${c.qty}</div>

        <button onclick="buy('${c.name}')">
          Comprar
        </button>
      </div>
    `;
  });
}

/* ======================
   SEARCH
====================== */
function searchCards(){

  const q = document.getElementById("search").value.toLowerCase();
  const box = document.getElementById("suggestions");

  if(q.length === 0){
    box.innerHTML = "";
    loadAllStock();
    return;
  }

  const matches = allCards.filter(c=>
    c.name.toLowerCase().includes(q)
  );

  box.innerHTML = matches.slice(0,8).map(m=>
    `<div onclick="selectSearch('${m.name}')">${m.name}</div>`
  ).join("");

  render(matches);
}

/* SELECT SEARCH */
function selectSearch(name){

  document.getElementById("search").value = name;
  document.getElementById("suggestions").innerHTML = "";

  const filtered = allCards.filter(c=>c.name === name);

  render(filtered);
}

/* ======================
   BUY
====================== */
function buy(name){

  window.open(
    "https://wa.me/57TU_NUMERO?text=Quiero%20la%20carta%20"+encodeURIComponent(name)
  );
}

/* INIT */
loadSets();
loadAllStock();

</script>

</body>
</html>
