<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Coleccionables</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* BANNER */
.banner{
  background:linear-gradient(90deg,#1e3a8a,#0ea5e9);
  padding:25px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

/* MENU */
.menu{
  display:flex;
  flex-wrap:wrap;
  background:#111827;
}

.menu button{
  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

.menu button:hover{
  background:#1f2937;
}

/* SECCIONES */
.section{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

/* GRID PRODUCTOS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:8px;
}

button.add{
  margin-top:5px;
  padding:5px;
  cursor:pointer;
  width:100%;
}
</style>
</head>

<body>

<div class="banner">
  🧩 Tienda de Coleccionables PRO
</div>

<div class="menu">
  <button onclick="openTab('pokemon')">Pokémon</button>
  <button onclick="openTab('jet')">Jet</button>
  <button onclick="openTab('monedas')">Monedas</button>
  <button onclick="openTab('billetes')">Billetes</button>
  <button onclick="openTab('albumes')">Álbumes</button>
  <button onclick="openTab('estampillas')">Estampillas</button>
  <button onclick="openTab('accesorios')">Accesorios</button>
</div>

<!-- POKÉMON -->
<div id="pokemon" class="section active">

  <h2>Pokémon</h2>

  <button onclick="toggleSub('sellados')">📦 Sellados</button>
  <button onclick="toggleSub('singles')">🃏 Cartas Singles</button>

  <!-- SELLADOS -->
  <div id="sellados" class="subsection" style="display:none;">
    <h3>Sellados</h3>
    <p>Aquí puedes poner booster boxes, ETB, packs, etc.</p>
  </div>

  <!-- SINGLES -->
  <div id="singles" class="subsection">

    <h3>Cartas Singles (Catálogo)</h3>

    <div id="grid" class="grid"></div>

  </div>

</div>

<!-- OTRAS PESTAÑAS -->
<div id="jet" class="section"><h2>Jet</h2></div>
<div id="monedas" class="section"><h2>Monedas</h2></div>
<div id="billetes" class="section"><h2>Billetes</h2></div>
<div id="albumes" class="section"><h2>Álbumes</h2></div>
<div id="estampillas" class="section"><h2>Estampillas</h2></div>
<div id="accesorios" class="section"><h2>Accesorios</h2></div>

<script>

const API = "https://api.pokemontcg.io/v2/cards?pageSize=30";
let cart = [];

function openTab(tab){
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

function toggleSub(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* CARGAR CARTAS */
async function loadCards(){

  const res = await fetch(API);
  const json = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  json.data.forEach(card => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${card.images.small}">
      <h4>${card.name}</h4>
      <p>${card.rarity || "N/A"}</p>

      <input type="number" placeholder="Precio" id="p_${card.id}">

      <button class="add" id="b_${card.id}">
        Agregar
      </button>
    `;

    grid.appendChild(div);

    document.getElementById(`b_${card.id}`).addEventListener("click", () => {
      addToCart(card);
    });

  });
}

function addToCart(card){

  const price = document.getElementById("p_" + card.id).value;

  if(!price || price <= 0){
    alert("Precio inválido");
    return;
  }

  cart.push({
    name: card.name,
    price: parseFloat(price)
  });

  console.log("Carrito:", cart);
  alert("Agregado: " + card.name);
}

loadCards();

</script>

</body>
</html>
