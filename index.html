<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V6</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:#1e3a8a;
  padding:10px;
  text-align:center;
}

/* SEARCH BAR */
.search{
  padding:10px;
  background:#111827;
  display:flex;
  gap:10px;
}

.search input{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SETS */
.sets{
  width:220px;
  height:100vh;
  overflow:auto;
  background:#111827;
  padding:8px;
}

.set{
  background:#1e293b;
  padding:6px;
  margin-bottom:6px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.set img{
  width:100%;
}

/* MAIN */
.main{
  flex:1;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
}

.card img{
  width:100%;
  border-radius:6px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#22c55e;
  color:white;
}

/* AUTOCOMPLETE */
.suggestions{
  position:absolute;
  background:#1e293b;
  width:300px;
  max-height:200px;
  overflow:auto;
  z-index:10;
}

.suggestions div{
  padding:6px;
  cursor:pointer;
}

.suggestions div:hover{
  background:#334155;
}
</style>
</head>

<body>

<header>
🃏 Pokémon TCG PRO V6 — Smart Store
</header>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Buscar carta..." oninput="searchCards()">
  <div id="suggestions" class="suggestions"></div>
</div>

<div class="container">

<!-- SETS -->
<div class="sets" id="sets"></div>

<!-- MAIN -->
<div class="main">
  <h3 id="title">Todos los productos en stock</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

/* DATA */
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let allCards = [];
let currentSet = null;
let searchMode = false;

/* ======================
   LOAD SETS (ORDERED)
====================== */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  const sets = json.data.sort((a,b)=>
    new Date(b.releaseDate) - new Date(a.releaseDate)
  );

  const box = document.getElementById("sets");

  sets.forEach(s=>{

    const div = document.createElement("div");
    div.className = "set";

    div.innerHTML = `
      <img src="${s.images.logo}">
      <div>${s.name}</div>
    `;

    div.onclick = ()=> loadSet(s.id, s.name);

    box.appendChild(div);
  });
}

/* ======================
   LOAD ALL STOCK INIT
====================== */
async function loadAllStock(){

  const res = await fetch(API_SETS);
  const sets = await res.json();

  let cards = [];

  for(const s of sets.data){

    const r = await fetch(API_CARDS + s.id);
    const j = await r.json();

    j.data.forEach(c=>{

      const inv = inventory[c.id];

      if(inv && inv.stock && inv.qty > 0){
        cards.push({
          id:c.id,
          name:c.name,
          img:c.images.small,
          set:s.name,
          qty:inv.qty
        });
      }
    });
  }

  allCards = cards;
  render(cards);
}

/* ======================
   LOAD BY SET
====================== */
async function loadSet(id, name){

  currentSet = id;
  searchMode = false;

  document.getElementById("title").innerText = name;

  const res = await fetch(API_CARDS + id);
  const json = await res.json();

  const cards = json.data
    .filter(c=>{
      const inv = inventory[c.id];
      return inv && inv.stock && inv.qty > 0;
    })
    .map(c=>({
      id:c.id,
      name:c.name,
      img:c.images.small,
      qty:inventory[c.id].qty
    }));

  render(cards);
}

/* ======================
   RENDER
====================== */
function render(cards){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cards.forEach(c=>{

    grid.innerHTML += `
      <div class="card">
        <img src="${c.img}">
        <div>${c.name}</div>
        <div>Stock: ${c.qty}</div>

        <button onclick="buy('${c.name}')">
          Comprar
        </button>
      </div>
    `;
  });
}

/* ======================
   SEARCH + AUTOCOMPLETE
====================== */
function searchCards(){

  const q = document.getElementById("search").value.toLowerCase();
  const box = document.getElementById("suggestions");

  if(q.length === 0){
    box.innerHTML = "";
    loadAllStock();
    return;
  }

  searchMode = true;

  const matches = allCards.filter(c=>
    c.name.toLowerCase().includes(q)
  );

  // autocomplete
  box.innerHTML = matches.slice(0,6).map(m=>
    `<div onclick="selectSearch('${m.name}')">${m.name}</div>`
  ).join("");

  render(matches);
}

/* SELECT SEARCH */
function selectSearch(name){

  document.getElementById("search").value = name;
  document.getElementById("suggestions").innerHTML = "";

  const filtered = allCards.filter(c=>c.name === name);
  render(filtered);
}

/* ======================
   BUY
====================== */
function buy(name){

  window.open(
    "https://wa.me/57TU_NUMERO?text=Quiero%20la%20carta%20"+encodeURIComponent(name)
  );
}

/* INIT */
loadSets();
loadAllStock();

</script>

</body>
</html>
