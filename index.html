<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V7.2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}
header{
  background:#1e3a8a;
  padding:10px;
  text-align:center;
}
.search{
  padding:10px;
  background:#111827;
  position:relative;
}
.search input{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
}
.suggestions{
  position:absolute;
  top:45px;
  left:10px;
  right:10px;
  background:#1e293b;
  max-height:200px;
  overflow:auto;
  z-index:1000;
}
.suggestions div{
  padding:6px;
  cursor:pointer;
}
.suggestions div:hover{
  background:#334155;
}
.container{display:flex;}
.sets{
  width:220px;
  height:100vh;
  overflow:auto;
  background:#111827;
  padding:8px;
}
.set{
  background:#1e293b;
  padding:6px;
  margin-bottom:6px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}
.set img{width:100%;}
.main{flex:1;padding:10px;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}
.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
}
.card img{width:100%;}
button{
  width:100%;
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
}
.global-btn{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  background:#3b82f6;
  border:none;
  border-radius:6px;
  color:white;
}
</style>
</head>

<body>

<header>🃏 Pokémon TCG PRO V7.2</header>

<div class="search">
  <input id="search" placeholder="Buscar carta..." oninput="searchCards()">
  <div id="suggestions" class="suggestions"></div>
</div>

<div class="container">

<div class="sets" id="sets">
  <button class="global-btn" onclick="loadAllStock()">🟢 Ver todo el stock</button>
</div>

<div class="main">
  <h3 id="title">Cargando...</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let allCards = [];
let loadedSets = {}; // cache

/* ======================
   VALIDAR STOCK
====================== */
function hasStock(id){
  const inv = inventory[id];
  return inv && inv.stock && inv.qty > 0;
}

/* ======================
   LOAD SETS MENU
====================== */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  const sets = json.data.sort((a,b)=>
    new Date(b.releaseDate) - new Date(a.releaseDate)
  );

  const box = document.getElementById("sets");

  sets.forEach(s=>{

    const div = document.createElement("div");
    div.className = "set";

    div.innerHTML = `
      <img src="${s.images.logo}">
      <div>${s.name}</div>
    `;

    div.onclick = ()=> loadSet(s.id, s.name);

    box.appendChild(div);
  });
}

/* ======================
   LOAD ALL STOCK
====================== */
async function loadAllStock(){

  document.getElementById("title").innerText =
    "Todas las cartas en stock";

  let cards = [];

  const hasInventory = Object.keys(inventory).length > 0;

  const resSets = await fetch(API_SETS);
  const sets = await resSets.json();

  const ordered = sets.data.sort((a,b)=>
    new Date(b.releaseDate) - new Date(a.releaseDate)
  );

  for(const s of ordered){

    // cache
    if(!loadedSets[s.id]){
      const res = await fetch(API_CARDS + s.id);
      const json = await res.json();
      loadedSets[s.id] = json.data;
    }

    const setCards = loadedSets[s.id];

    setCards.forEach(c=>{

      if(hasInventory){
        if(hasStock(c.id)){
          cards.push({
            id:c.id,
            name:c.name,
            img:c.images.small,
            set:s.name,
            qty:inventory[c.id].qty
          });
        }
      }else{
        // modo demo
        cards.push({
          id:c.id,
          name:c.name,
          img:c.images.small,
          set:s.name,
          qty:1
        });
      }

    });
  }

  // fallback si no hay coincidencias
  if(cards.length === 0){
    const firstSet = ordered[0];

    const res = await fetch(API_CARDS + firstSet.id);
    const json = await res.json();

    cards = json.data.slice(0,20).map(c=>({
      id:c.id,
      name:c.name,
      img:c.images.small,
      set:firstSet.name,
      qty:1
    }));
  }

  allCards = cards;

  renderGrouped(cards);
}

/* ======================
   RENDER GROUPED
====================== */
function renderGrouped(cards){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const grouped = {};

  cards.forEach(c=>{
    if(!grouped[c.set]) grouped[c.set] = [];
    grouped[c.set].push(c);
  });

  Object.keys(grouped).forEach(set=>{

    grid.innerHTML += `<h3 style="grid-column:1/-1">${set}</h3>`;

    grouped[set].forEach(c=>{

      grid.innerHTML += `
        <div class="card">
          <img src="${c.img}">
          <div>${c.name}</div>
          <div>Stock: ${c.qty}</div>
          <button onclick="buy('${c.name}')">Comprar</button>
        </div>
      `;
    });
  });
}

/* ======================
   LOAD SET
====================== */
async function loadSet(setId, name){

  document.getElementById("title").innerText = name;

  if(!loadedSets[setId]){
    const res = await fetch(API_CARDS + setId);
    const json = await res.json();
    loadedSets[setId] = json.data;
  }

  const filtered = loadedSets[setId]
    .filter(c => hasStock(c.id))
    .map(c=>({
      id:c.id,
      name:c.name,
      img:c.images.small,
      qty:inventory[c.id]?.qty || 1
    }));

  render(filtered);
}

/* ======================
   RENDER SIMPLE
====================== */
function render(cards){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cards.forEach(c=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${c.img}">
        <div>${c.name}</div>
        <div>Stock: ${c.qty}</div>
        <button onclick="buy('${c.name}')">Comprar</button>
      </div>
    `;
  });
}

/* ======================
   SEARCH
====================== */
function searchCards(){

  const q = document.getElementById("search").value.toLowerCase();
  const box = document.getElementById("suggestions");

  if(q.length === 0){
    box.innerHTML = "";
    loadAllStock();
    return;
  }

  const matches = allCards.filter(c=>
    c.name.toLowerCase().includes(q)
  );

  box.innerHTML = matches.slice(0,8).map(m=>
    `<div onclick="selectSearch('${m.name}')">${m.name}</div>`
  ).join("");

  render(matches);
}

/* ====================== */
function selectSearch(name){

  document.getElementById("search").value = "";
  document.getElementById("suggestions").innerHTML = "";

  const filtered = allCards.filter(c=>c.name === name);
  render(filtered);
}

/* ====================== */
function buy(name){
  window.open(
    "https://wa.me/57TU_NUMERO?text=Quiero%20la%20carta%20"+encodeURIComponent(name)
  );
}

/* INIT */
loadSets();
loadAllStock();

</script>

</body>
</html>
