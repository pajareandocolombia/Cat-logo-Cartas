<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda PRO Coleccionables</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* BANNER */
.banner{
  background:linear-gradient(90deg,#1e3a8a,#0ea5e9);
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* MENU */
.menu{
  display:flex;
  flex-wrap:wrap;
  background:#111827;
}

.menu button{
  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

.menu button:hover{
  background:#1f2937;
}

/* SECCIONES */
.section{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:8px;
}

button.add{
  margin-top:5px;
  width:100%;
  padding:6px;
  cursor:pointer;
}

/* CARRITO */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:280px;
  height:100%;
  background:#0b1220;
  border-left:2px solid #1f2937;
  padding:10px;
  overflow:auto;
}

.cart h3{
  margin-top:0;
}

.cart-item{
  background:#1e293b;
  padding:8px;
  margin-bottom:8px;
  border-radius:8px;
}

/* BADGE */
.badge{
  background:red;
  padding:2px 6px;
  border-radius:10px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="banner">
  🧩 Tienda PRO de Coleccionables
</div>

<div class="menu">
  <button onclick="openTab('pokemon')">Pokémon</button>
  <button onclick="openTab('jet')">Jet</button>
  <button onclick="openTab('monedas')">Monedas</button>
  <button onclick="openTab('billetes')">Billetes</button>
  <button onclick="openTab('albumes')">Álbumes</button>
  <button onclick="openTab('estampillas')">Estampillas</button>
  <button onclick="openTab('accesorios')">Accesorios</button>
  <button onclick="openTab('juegos')">🎮 Juegos</button>
</div>

<!-- POKÉMON -->
<div id="pokemon" class="section active">

  <h2>Pokémon</h2>

  <button onclick="toggle('sellados')">📦 Sellados</button>
  <button onclick="toggle('singles')">🃏 Singles</button>

  <div id="sellados" style="display:none;">
    <h3>Sellados</h3>
    <p>ETB, Booster Boxes, Packs, etc.</p>
  </div>

  <div id="singles">
    <h3>Cartas Singles</h3>
    <div id="grid" class="grid"></div>
  </div>

</div>

<!-- JUEGOS -->
<div id="juegos" class="section">
  <h2>🎮 Juegos</h2>
  <div class="grid">

    <div class="card">
      <h3>Pokémon Scarlet</h3>
      <p>Juego Nintendo Switch</p>
      <input type="number" placeholder="Precio">
      <button class="add" onclick="addManual('Pokémon Scarlet')">Agregar</button>
    </div>

    <div class="card">
      <h3>Zelda TOTK</h3>
      <p>Aventura Nintendo Switch</p>
      <input type="number" placeholder="Precio">
      <button class="add" onclick="addManual('Zelda TOTK')">Agregar</button>
    </div>

  </div>
</div>

<!-- OTRAS -->
<div id="jet" class="section"><h2>Jet</h2></div>
<div id="monedas" class="section"><h2>Monedas</h2></div>
<div id="billetes" class="section"><h2>Billetes</h2></div>
<div id="albumes" class="section"><h2>Álbumes</h2></div>
<div id="estampillas" class="section"><h2>Estampillas</h2></div>
<div id="accesorios" class="section"><h2>Accesorios</h2></div>

<!-- CARRITO -->
<div class="cart">
  <h3>🛒 Carrito <span class="badge" id="count">0</span></h3>
  <div id="cartItems"></div>
</div>

<script>

const API = "https://api.pokemontcg.io/v2/cards?pageSize=20";

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function openTab(tab){
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

function toggle(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* CARRITO */
function updateCart(){
  localStorage.setItem("cart", JSON.stringify(cart));

  document.getElementById("count").innerText = cart.length;

  const box = document.getElementById("cartItems");
  box.innerHTML = "";

  cart.forEach((item, i) => {
    box.innerHTML += `
      <div class="cart-item">
        <b>${item.name}</b><br>
        $${item.price}
      </div>
    `;
  });
}

/* AGREGAR */
function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

/* JUEGOS MANUAL */
function addManual(name){
  const price = event.target.parentElement.querySelector("input").value;

  if(!price || price <= 0){
    alert("Precio inválido");
    return;
  }

  addToCart(name, parseFloat(price));
}

/* POKÉMON API */
async function loadCards(){

  const res = await fetch(API);
  const json = await res.json();

  const grid = document.getElementById("grid");

  json.data.forEach(card => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${card.images.small}">
      <h4>${card.name}</h4>
      <p>${card.rarity || "N/A"}</p>

      <input type="number" placeholder="Precio" id="p_${card.id}">
      <button class="add" id="b_${card.id}">Agregar</button>
    `;

    grid.appendChild(div);

    document.getElementById(`b_${card.id}`).addEventListener("click", () => {
      const price = document.getElementById("p_" + card.id).value;

      if(!price || price <= 0){
        alert("Precio inválido");
        return;
      }

      addToCart(card.name, parseFloat(price));
    });

  });
}

loadCards();
updateCart();

</script>

</body>
</html>
