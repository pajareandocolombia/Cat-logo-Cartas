<script>

function formatPrice(v){
  return new Intl.NumberFormat('es-CO',{
    style:'currency',
    currency:'COP',
    minimumFractionDigits:0
  }).format(v);
}

async function load(){

  const data = await fetch("cartas.json").then(r=>r.json());

  const disponibles = data.filter(c => c.available);

  const grid = document.getElementById("grid");

  grid.innerHTML = disponibles.map(c=>`
    <div class="card">
      <img src="${c.small}" onclick="openImg('${c.large}')">
      <h4>${c.name}</h4>
      <p>${c.rarity}</p>
      <div class="price">${formatPrice(c.price)}</div>
    </div>
  `).join("");

}

function openImg(src){
  modal.style.display="flex";
  modalImg.src = src;
}

document.addEventListener("click",e=>{
  if(e.target.id==="modal"){
    modal.style.display="none";
  }
});

load();

</script>
