<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
}

h1{text-align:center;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.card img{
  width:100%;
}

button{
  margin-top:5px;
  padding:5px;
}
</style>
</head>

<body>

<h1>Tienda Pokémon</h1>

<div id="grid" class="grid"></div>

<script>

const API = "https://api.pokemontcg.io/v2/cards?pageSize=20";

let cart = [];

async function load(){

  try {

    const res = await fetch(API);
    const json = await res.json();

    const grid = document.getElementById("grid");

    grid.innerHTML = json.data.map(c => `
      <div class="card">
        <img src="${c.images.small}">
        <h4>${c.name}</h4>
        <p>${c.rarity || "N/A"}</p>

        <input type="number" placeholder="Precio" id="p_${c.id}">

        <button onclick="add('${c.id}','${c.name}')">
          Agregar
        </button>
      </div>
    `).join("");

  } catch(e){
    document.body.innerHTML = "<h2>Error cargando datos</h2>";
    console.error(e);
  }

}

function add(id,name){

  const price = document.getElementById("p_"+id).value;

  if(!price){
    alert("Pon precio primero");
    return;
  }

  cart.push({name,price});

  alert("Agregado: " + name);
}

document.addEventListener("DOMContentLoaded", load);

</script>

</body>
</html>
