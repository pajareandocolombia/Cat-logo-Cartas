<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V4</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:#1e3a8a;
  padding:12px;
  text-align:center;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SIDEBAR SETS */
.sets{
  width:220px;
  height:100vh;
  overflow:auto;
  background:#111827;
  padding:8px;
}

.set{
  background:#1e293b;
  padding:6px;
  margin-bottom:6px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.set img{
  width:100%;
  border-radius:4px;
}

/* MAIN */
.main{
  flex:1;
  padding:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
  font-size:13px;
}

.card img{
  width:100%;
  border-radius:6px;
}

/* BUY BUTTON */
button{
  width:100%;
  margin-top:5px;
  padding:6px;
  cursor:pointer;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:6px;
}

/* HIDDEN ADMIN */
.adminTag{
  display:none;
}
</style>
</head>

<body>

<header>
🃏 Tienda Pokémon PRO — Vista Usuario
</header>

<div class="container">

<!-- COLECCIONES -->
<div class="sets" id="sets"></div>

<!-- PRODUCTOS -->
<div class="main">
  <h3 id="title">Selecciona una colección</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

/* INVENTARIO GLOBAL (ADMIN LO CONTROLA) */
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};

/* LOAD SETS */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  const box = document.getElementById("sets");
  box.innerHTML = "";

  json.data.forEach(s=>{

    const div = document.createElement("div");
    div.className = "set";

    div.innerHTML = `
      <img src="${s.images.logo}">
      <div>${s.name}</div>
    `;

    div.onclick = ()=> loadCards(s.id, s.name);

    box.appendChild(div);
  });
}

/* LOAD CARDS (SOLO STOCK DISPONIBLE) */
async function loadCards(setId, name){

  document.getElementById("title").innerText = name;

  const res = await fetch(API_CARDS + setId);
  const json = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  json.data.forEach(c=>{

    const inv = inventory[c.id];

    // ❌ SOLO MOSTRAR SI TIENE STOCK
    if(!inv || !inv.stock || inv.qty <= 0) return;

    grid.innerHTML += `
      <div class="card">
        <img src="${c.images.small}">
        <div>${c.name}</div>
        <div>Stock: ${inv.qty}</div>

        <button onclick="buy('${c.name}')">
          Comprar por WhatsApp
        </button>
      </div>
    `;
  });
}

/* WHATSAPP BUY */
function buy(name){
  window.open(
    "https://wa.me/57TU_NUMERO?text=Quiero%20la%20carta%20"+encodeURIComponent(name)
  );
}

/* INIT */
loadSets();

</script>

</body>
</html>
