<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V12.1</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}

header{
  background:#1e3a8a;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.admin-btn{
  background:#f59e0b;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.search{padding:10px;background:#111827;}
.search input{width:100%;padding:8px;border:none;border-radius:6px;}

.container{display:flex;}
.main{flex:1;padding:10px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
}

.card img{width:100%;}

button{
  width:100%;
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* CART */
#cartFloating{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
  z-index:9999;
}

#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:300px;
  height:100%;
  background:#020617;
  padding:10px;
  transition:0.3s;
}

/* ADMIN */
#adminPanel{
  position:fixed;
  top:0;
  right:-450px;
  width:450px;
  height:100%;
  background:#020617;
  overflow:auto;
  padding:10px;
  transition:0.3s;
}
</style>
</head>

<body>

<header>
  <div>🃏 Pokémon PRO V12.1</div>
  <button class="admin-btn" onclick="openLogin()">Admin</button>
</header>

<div class="search">
  <input id="search" placeholder="Buscar carta..." oninput="searchFront()">
</div>

<div class="container">
  <div class="main">
    <h3>Stock disponible</h3>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- CART -->
<div id="cartFloating" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>

<div id="cartPanel">
  <h3>Carrito</h3>
  <div id="cartItems"></div>
  <h4 id="cartTotal">Total: $0</h4>
  <button onclick="checkout()">Comprar</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <h2>ADMIN</h2>
  <button onclick="loadAdminSets()">Cargar sets</button>

  <select id="setSelect" onchange="loadSet(this.value)"></select>

  <input id="adminSearch" placeholder="Buscar..." oninput="filterAdmin()">

  <div id="adminGrid"></div>
</div>

<!-- LOGIN -->
<div id="loginOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);align-items:center;justify-content:center;">
  <div style="background:#1e293b;padding:20px;border-radius:10px;width:280px;">
    <h3>Login</h3>
    <input id="pass" type="password">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<script>

/* ================= DATA ================= */
const API_SETS="https://api.pokemontcg.io/v2/sets";
const API_CARDS="https://api.pokemontcg.io/v2/cards?q=set.id:";

let inventory=JSON.parse(localStorage.getItem("inventory")||"{}");
let cardCache=JSON.parse(localStorage.getItem("cardCache")||"{}");
let cart=JSON.parse(localStorage.getItem("cart")||"[]");

let setsData=[];
let currentAdminCards=[];

/* ================= SAVE ================= */
function saveCart(){
  localStorage.setItem("cart",JSON.stringify(cart));
}

/* ================= 🔥 FIX CENTRAL (NUEVO) ================= */
function syncInventory(){
  localStorage.setItem("inventory",JSON.stringify(inventory));

  // refresco automático del front
  loadFront();
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded",async()=>{
  await fetchSets();
  loadFront();
  updateCart();
});

/* ================= SETS ================= */
async function fetchSets(){
  const r=await fetch(API_SETS);
  const j=await r.json();
  setsData=j.data;
}

/* ================= FRONT ================= */
function loadFront(){

  const ids=Object.keys(inventory).filter(i=>inventory[i].stock);

  const grouped={};

  ids.forEach(id=>{
    const inv=inventory[id];
    const c=cardCache[id];
    if(!c) return;

    if(!grouped[c.set]) grouped[c.set]=[];

    grouped[c.set].push({
      id,
      name:c.name,
      img:c.img,
      price:inv.price||0
    });
  });

  renderFront(grouped);
}

function renderFront(grouped){

  const g=document.getElementById("grid");
  g.innerHTML="";

  Object.keys(grouped).forEach(set=>{

    g.innerHTML+=`<div class="card" style="background:#1e3a8a;text-align:center;">${set}</div>`;

    grouped[set].forEach(c=>{
      g.innerHTML+=`
        <div class="card">
          <img src="${c.img}">
          <div>${c.name}</div>
          <div>$${c.price}</div>
          <button onclick="addCart('${c.id}')">Agregar</button>
        </div>
      `;
    });

  });
}

/* ================= CART ================= */
function addCart(id){

  const inv=inventory[id];
  const c=cardCache[id];
  if(!inv||!c) return;

  let ex=cart.find(i=>i.id===id);

  if(ex) ex.qty++;
  else cart.push({id,name:c.name,price:inv.price||0,qty:1});

  saveCart();
  updateCart();
}

/* ================= CART UI ================= */
function updateCart(){

  let total=0;
  document.getElementById("cartCount").innerText=
    cart.reduce((a,b)=>a+b.qty,0);

  const box=document.getElementById("cartItems");
  box.innerHTML="";

  cart.forEach(i=>{
    total+=i.qty*i.price;
    box.innerHTML+=`
      <div style="display:flex;justify-content:space-between;">
        <span>${i.name}</span>
        <span>$${i.qty*i.price}</span>
      </div>
    `;
  });

  document.getElementById("cartTotal").innerText="Total: $"+total;
}

/* ================= ADMIN ================= */
async function loadAdminSets(){

  const sel=document.getElementById("setSelect");
  sel.innerHTML=setsData.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");
}

async function loadSet(setId){

  const res=await fetch(API_CARDS+setId);
  const j=await res.json();

  currentAdminCards=j.data;

  renderAdmin(j.data.slice(0,50));
}

/* ================= ADMIN RENDER ================= */
function renderAdmin(cards){

  const box=document.getElementById("adminGrid");
  box.innerHTML="";

  cards.forEach(c=>{

    const inv=inventory[c.id]||{stock:false,price:0};

    box.innerHTML+=`
      <div class="card">

        <img src="${c.images.small}" width="60">

        <div>${c.name}</div>

        <label>
          <input type="checkbox"
            ${inv.stock?"checked":""}
            onchange="toggle('${c.id}','${c.name}','${c.images.small}','${c.set.name}')">
          stock
        </label>

        <input type="number"
          value="${inv.price||0}"
          onchange="price('${c.id}',this.value)">

      </div>
    `;
  });
}

/* ================= FILTER ================= */
function filterAdmin(){

  const q=document.getElementById("adminSearch").value.toLowerCase();

  renderAdmin(
    currentAdminCards.filter(c=>c.name.toLowerCase().includes(q)).slice(0,50)
  );
}

/* ================= 🔥 FIX STOCK ================= */
function toggle(id,name,img,set){

  if(!inventory[id]){
    inventory[id]={stock:false,price:0,qty:1,set};
  }

  inventory[id].stock=!inventory[id].stock;

  cardCache[id]={name,img,set};

  syncInventory(); // 🔥 FIX APLICADO
}

/* ================= 🔥 FIX PRICE ================= */
function price(id,p){

  if(!inventory[id]){
    inventory[id]={stock:false,price:0,qty:1};
  }

  inventory[id].price=parseFloat(p)||0;

  syncInventory(); // 🔥 FIX APLICADO
}

/* ================= AUTH ================= */
function openLogin(){
  document.getElementById("loginOverlay").style.display="flex";
}

function login(){
  if(document.getElementById("pass").value==="1234"){
    document.getElementById("loginOverlay").style.display="none";
    document.getElementById("adminPanel").style.right="0px";
  }
}

/* ================= CART ================= */
function toggleCart(){
  const p=document.getElementById("cartPanel");
  p.style.right=p.style.right==="0px"?"-350px":"0px";
}

</script>

</body>
</html>
