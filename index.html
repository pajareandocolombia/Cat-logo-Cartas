<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:#1e3a8a;
  padding:12px;
  text-align:center;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SIDEBAR SETS */
.sets{
  width:220px;
  height:100vh;
  overflow:auto;
  background:#111827;
  padding:8px;
}

.set{
  background:#1e293b;
  padding:6px;
  margin-bottom:6px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.set img{
  width:100%;
  border-radius:4px;
}

/* MAIN */
.main{
  flex:1;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
  font-size:13px;
}

.card img{
  width:100%;
  border-radius:6px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:5px;
  padding:6px;
  cursor:pointer;
  border:none;
  border-radius:6px;
}

/* BUY */
.buy{
  background:#22c55e;
  color:white;
}

/* ADMIN BUTTON */
.adminBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:#f59e0b;
  color:black;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* ADMIN PANEL */
#adminPanel{
  position:fixed;
  top:0;
  right:0;
  width:260px;
  height:100%;
  background:#111827;
  padding:10px;
  display:none;
  border-left:2px solid #f59e0b;
}

input{
  width:100%;
  margin-bottom:5px;
  padding:6px;
}

/* STOCK TAG */
.stock{
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<header>
🃏 Tienda Pokémon PRO FINAL
</header>

<button class="adminBtn" onclick="openAdmin()">Admin</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<h3>🔐 Admin Panel</h3>

<input id="pass" type="password" placeholder="Password">
<button onclick="loginAdmin()">Entrar</button>

<hr>

<input id="name" placeholder="Nombre carta">
<input id="price" placeholder="Precio">

<button onclick="addManualCard()">Agregar carta manual</button>

<hr>

<p>Estado admin: <span id="status">NO</span></p>

<button onclick="closeAdmin()">Cerrar</button>
</div>

<div class="container">

<!-- SETS -->
<div class="sets" id="sets"></div>

<!-- MAIN -->
<div class="main">
  <h3 id="title">Selecciona una colección</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

/* INVENTARIO GLOBAL */
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};

/* ADMIN STATE */
let admin = false;

/* ======================
   ADMIN PANEL
====================== */
function openAdmin(){
  document.getElementById("adminPanel").style.display="block";
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display="none";
}

function loginAdmin(){
  const pass = document.getElementById("pass").value;

  if(pass === "1234"){
    admin = true;
    document.getElementById("status").innerText = "SI";
    alert("Admin activado");
  } else {
    alert("Password incorrecto");
  }
}

/* ======================
   SETS
====================== */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  const box = document.getElementById("sets");

  json.data.forEach(s=>{

    const div = document.createElement("div");
    div.className = "set";

    div.innerHTML = `
      <img src="${s.images.logo}">
      <div>${s.name}</div>
    `;

    div.onclick = ()=> loadCards(s.id, s.name);

    box.appendChild(div);
  });
}

/* ======================
   CARDS
====================== */
async function loadCards(setId, name){

  document.getElementById("title").innerText = name;

  const res = await fetch(API_CARDS + setId);
  const json = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  json.data.forEach(c=>{

    if(!inventory[c.id]){
      inventory[c.id] = {
        stock:false,
        qty:0,
        price:0
      };
    }

    const inv = inventory[c.id];

    // 👤 USUARIO: solo stock activo
    if(!admin && (!inv.stock || inv.qty <= 0)) return;

    grid.innerHTML += `
      <div class="card">
        <img src="${c.images.small}">
        <div>${c.name}</div>

        <div class="stock">
          Stock: ${inv.qty}
        </div>

        ${admin ? `
          <button onclick="toggleStock('${c.id}')">
            ${inv.stock ? "❌ Desactivar" : "✔ Activar"}
          </button>

          <button onclick="addStock('${c.id}')">+ Stock</button>
          <button onclick="removeStock('${c.id}')">- Stock</button>
        ` : `
          <button class="buy" onclick="buy('${c.name}')">
            Comprar por WhatsApp
          </button>
        `}
      </div>
    `;
  });

  save();
}

/* ======================
   STOCK CONTROL
====================== */
function toggleStock(id){
  inventory[id].stock = !inventory[id].stock;

  if(inventory[id].stock && inventory[id].qty === 0){
    inventory[id].qty = 1;
  }

  save();
  reload();
}

function addStock(id){
  inventory[id].qty++;
  inventory[id].stock = true;
  save();
  reload();
}

function removeStock(id){
  if(inventory[id].qty > 0){
    inventory[id].qty--;
  }

  if(inventory[id].qty === 0){
    inventory[id].stock = false;
  }

  save();
  reload();
}

/* ======================
   WHATSAPP BUY
====================== */
function buy(name){
  window.open(
    "https://wa.me/57TU_NUMERO?text=Quiero%20la%20carta%20"+encodeURIComponent(name)
  );
}

/* ======================
   MANUAL ADD (OPTIONAL)
====================== */
function addManualCard(){
  alert("Esto es demo. Usa sets para cartas reales.");
}

/* ======================
   STORAGE
====================== */
function save(){
  localStorage.setItem("inventory", JSON.stringify(inventory));
}

function reload(){
  location.reload();
}

/* INIT */
loadSets();

</script>

</body>
</html>
