<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda PRO v3</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* BANNER */
.banner{
  background:linear-gradient(90deg,#1e3a8a,#0ea5e9);
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* MENU */
.menu{
  display:flex;
  flex-wrap:wrap;
  background:#111827;
}

.menu button{
  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

.menu button:hover{
  background:#1f2937;
}

/* SECCIONES */
.section{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

/* SUB SECCIONES */
.submenu button{
  margin-right:10px;
  margin-bottom:10px;
  padding:6px 10px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:8px;
}

button.add{
  width:100%;
  margin-top:5px;
  padding:6px;
  cursor:pointer;
}

/* CARRITO PRO */
.cart{
  position:fixed;
  right:0;
  top:0;
  height:100%;
  width:60px;
  background:#0b1220;
  border-left:2px solid #1f2937;
  overflow:hidden;
  transition:0.3s;
}

.cart:hover{
  width:300px;
}

.cart-header{
  padding:10px;
  font-weight:bold;
  background:#111827;
  text-align:center;
}

.badge{
  background:red;
  padding:2px 6px;
  border-radius:10px;
  font-size:12px;
}

.cart-content{
  padding:10px;
  opacity:0;
}

.cart:hover .cart-content{
  opacity:1;
}

.cart-item{
  background:#1e293b;
  padding:8px;
  margin-bottom:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="banner">
  🧩 Tienda PRO v3 - Coleccionables & Juegos
</div>

<!-- MENU ORDENADO -->
<div class="menu">
  <button onclick="openTab('pokemon')">Pokémon</button>
  <button onclick="openTab('juegos')">🎮 Juegos</button>
  <button onclick="openTab('jet')">Jet</button>
  <button onclick="openTab('monedas')">Monedas</button>
  <button onclick="openTab('billetes')">Billetes</button>
  <button onclick="openTab('albumes')">Álbumes</button>
  <button onclick="openTab('estampillas')">Estampillas</button>
  <button onclick="openTab('accesorios')">Accesorios</button>
</div>

<!-- 🃏 POKÉMON -->
<div id="pokemon" class="section active">

  <h2>Pokémon</h2>

  <div class="submenu">
    <button onclick="showPokemon('sellados')">📦 Sellados</button>
    <button onclick="showPokemon('singles')">🃏 Cartas Individuales</button>
  </div>

  <!-- SELLADOS -->
  <div id="sellados">
    <h3>Sellados</h3>
    <p>ETB, Booster Boxes, Packs sellados próximamente...</p>
  </div>

  <!-- SINGLES -->
  <div id="singles" style="display:none;">
    <h3>Cartas Individuales</h3>
    <div id="grid" class="grid"></div>
  </div>

</div>

<!-- 🎮 JUEGOS -->
<div id="juegos" class="section">

  <h2>🎮 Juegos</h2>

  <div class="grid">

    <div class="card">
      <h3>Pokémon Scarlet</h3>
      <input type="number" placeholder="Precio">
      <button class="add" onclick="addManual('Pokémon Scarlet', this)">Agregar</button>
    </div>

    <div class="card">
      <h3>Zelda TOTK</h3>
      <input type="number" placeholder="Precio">
      <button class="add" onclick="addManual('Zelda TOTK', this)">Agregar</button>
    </div>

  </div>

</div>

<!-- OTROS -->
<div id="jet" class="section"><h2>Jet</h2></div>
<div id="monedas" class="section"><h2>Monedas</h2></div>
<div id="billetes" class="section"><h2>Billetes</h2></div>
<div id="albumes" class="section"><h2>Álbumes</h2></div>
<div id="estampillas" class="section"><h2>Estampillas</h2></div>
<div id="accesorios" class="section"><h2>Accesorios</h2></div>

<!-- 🛒 CARRITO -->
<div class="cart">

  <div class="cart-header">
    🛒 <span class="badge" id="count">0</span>
  </div>

  <div class="cart-content" id="cartItems">
    <p style="font-size:12px;color:#9ca3af;">Hover para ver carrito</p>
  </div>

</div>

<script>

const API = "https://api.pokemontcg.io/v2/cards?pageSize=20";

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* NAV */
function openTab(tab){
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

/* POKEMON SUB */
function showPokemon(section){

  document.getElementById("sellados").style.display = "none";
  document.getElementById("singles").style.display = "none";

  document.getElementById(section).style.display = "block";
}

/* CART */
function updateCart(){

  localStorage.setItem("cart", JSON.stringify(cart));

  document.getElementById("count").innerText = cart.length;

  const box = document.getElementById("cartItems");
  box.innerHTML = "";

  cart.forEach(item => {
    box.innerHTML += `
      <div class="cart-item">
        <b>${item.name}</b><br>
        $${item.price}
      </div>
    `;
  });
}

function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

/* JUEGOS */
function addManual(name, btn){
  const price = btn.parentElement.querySelector("input").value;

  if(!price || price <= 0){
    alert("Precio inválido");
    return;
  }

  addToCart(name, parseFloat(price));
}

/* API POKEMON */
async function loadCards(){

  const res = await fetch(API);
  const json = await res.json();

  const grid = document.getElementById("grid");

  json.data.forEach(card => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${card.images.small}">
      <h4>${card.name}</h4>
      <input type="number" placeholder="Precio" id="p_${card.id}">
      <button class="add" id="b_${card.id}">Agregar</button>
    `;

    grid.appendChild(div);

    document.getElementById(`b_${card.id}`).addEventListener("click", () => {

      const price = document.getElementById("p_" + card.id).value;

      if(!price || price <= 0){
        alert("Precio inválido");
        return;
      }

      addToCart(card.name, parseFloat(price));
    });

  });
}

loadCards();
updateCart();

</script>

</body>
</html>
