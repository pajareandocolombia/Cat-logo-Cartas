<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V5</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:#1e3a8a;
  padding:12px;
  text-align:center;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SETS */
.sets{
  width:220px;
  height:100vh;
  overflow:auto;
  background:#111827;
  padding:8px;
}

.set{
  background:#1e293b;
  padding:6px;
  margin-bottom:6px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.set img{
  width:100%;
}

/* MAIN */
.main{
  flex:1;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
}

.card img{
  width:100%;
  border-radius:6px;
}

/* BUTTONS */
button{
  width:100%;
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.add{
  background:#22c55e;
  color:white;
}

/* CART */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:280px;
  height:100%;
  background:#0b1220;
  padding:10px;
  overflow:auto;
  border-left:2px solid #1e3a8a;
}

.cart-item{
  background:#1e293b;
  padding:6px;
  margin-bottom:5px;
  border-radius:6px;
}

.total{
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
🛒 Tienda Pokémon PRO V5 — Carrito Amazon
</header>

<div class="container">

<!-- SETS -->
<div class="sets" id="sets"></div>

<!-- MAIN -->
<div class="main">
  <h3 id="title">Selecciona una colección</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<!-- CART -->
<div class="cart">
  <h3>🛒 Carrito</h3>
  <div id="cart"></div>
  <div class="total" id="total"></div>
  <button onclick="checkout()">Pagar por WhatsApp</button>
</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

/* DATA */
let cart = [];
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};

/* ======================
   SETS (ORDENADOS)
====================== */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  // 🔥 ORDEN POR MÁS RECIENTE
  const sets = json.data.sort((a,b)=>{
    return new Date(b.releaseDate) - new Date(a.releaseDate);
  });

  const box = document.getElementById("sets");
  box.innerHTML = "";

  sets.forEach(s=>{

    const div = document.createElement("div");
    div.className = "set";

    div.innerHTML = `
      <img src="${s.images.logo}">
      <div>${s.name}</div>
    `;

    div.onclick = ()=> loadCards(s.id, s.name);

    box.appendChild(div);
  });
}

/* ======================
   CARDS
====================== */
async function loadCards(setId, name){

  document.getElementById("title").innerText = name;

  const res = await fetch(API_CARDS + setId);
  const json = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  json.data.forEach(c=>{

    const inv = inventory[c.id];

    if(!inv || !inv.stock || inv.qty <= 0) return;

    grid.innerHTML += `
      <div class="card">
        <img src="${c.images.small}">
        <div>${c.name}</div>
        <div>Stock: ${inv.qty}</div>

        <button class="add" onclick="addToCart('${c.name}', ${inv.price || 0})">
          Agregar al carrito
        </button>
      </div>
    `;
  });
}

/* ======================
   CART (AMAZON STYLE)
====================== */
function addToCart(name, price){

  cart.push({name, price: price || 10000});

  renderCart();
}

function renderCart(){

  const box = document.getElementById("cart");
  box.innerHTML = "";

  let total = 0;

  cart.forEach((c,i)=>{

    total += c.price;

    box.innerHTML += `
      <div class="cart-item">
        ${c.name}<br>
        $${c.price}
        <button onclick="removeItem(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerText =
    "Total: $" + total;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

/* ======================
   CHECKOUT WHATSAPP
====================== */
function checkout(){

  if(cart.length === 0){
    alert("Carrito vacío");
    return;
  }

  let msg = "Hola quiero comprar:%0A";

  let total = 0;

  cart.forEach(c=>{
    msg += "- " + c.name + " $" + c.price + "%0A";
    total += c.price;
  });

  msg += "%0ATotal: $" + total;

  window.open("https://wa.me/57TU_NUMERO?text=" + msg);
}

/* INIT */
loadSets();

</script>

</body>
</html>
