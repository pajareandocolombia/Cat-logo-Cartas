<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V11</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}

header{
  background:#1e3a8a;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.admin-btn{
  background:#f59e0b;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.search{padding:10px;background:#111827;}
.search input{width:100%;padding:8px;border-radius:6px;border:none;}

.container{display:flex;}
.main{flex:1;padding:10px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
  transition:0.2s;
  position:relative;
}

.card:hover{
  transform:scale(1.03);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card img{width:100%;}

button{
  width:100%;
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* CART */
#cartFloating{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
  z-index:9999;
}

#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:300px;
  height:100%;
  background:#020617;
  padding:10px;
  transition:0.3s;
  z-index:9999;
}

/* ADMIN */
#adminPanel{
  position:fixed;
  top:0;
  right:-450px;
  width:450px;
  height:100%;
  background:#020617;
  overflow:auto;
  padding:10px;
  transition:0.3s;
  z-index:9999;
}

.badge{
  position:absolute;
  top:5px;
  left:5px;
  font-size:10px;
  padding:3px 6px;
  border-radius:6px;
  background:#22c55e;
}
.badge.red{background:#ef4444;}
</style>
</head>

<body>

<header>
  <div>🃏 Tienda Pokémon PRO V11</div>
  <button class="admin-btn" onclick="openLogin()">Admin</button>
</header>

<div class="search">
  <input id="search" placeholder="Buscar carta..." oninput="searchCards()">
</div>

<div class="container">
  <div class="main">
    <h3 id="title">Stock disponible</h3>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- CART -->
<div id="cartFloating" onclick="toggleCart()">
  🛒 <span id="cartCount">0</span>
</div>

<div id="cartPanel">
  <h3>Carrito</h3>
  <div id="cartItems"></div>
  <h4 id="cartTotal">Total: $0</h4>
  <button onclick="checkout()">Comprar</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <h2>🛠️ ADMIN V11</h2>
  <button onclick="logoutAdmin()" style="background:#ef4444;">Logout</button>
  <div id="adminContent"></div>
</div>

<!-- LOGIN -->
<div id="loginOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
  <div style="background:#1e293b;padding:20px;border-radius:10px;width:280px;">
    <h3>Login Admin</h3>
    <input id="pass" type="password" placeholder="Contraseña" style="width:100%;padding:8px;">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<script>

/* ================= DATA ================= */
const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

let inventory = JSON.parse(localStorage.getItem("inventory") || "{}");
let cardCache = JSON.parse(localStorage.getItem("cardCache") || "{}");
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

let setsData = [];
let globalCards = [];

/* ================= SAVE ================= */
function saveInventory(){
  localStorage.setItem("inventory", JSON.stringify(inventory));
}
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async ()=>{
  await loadSets();
  loadAllStock();
  updateCart();

  if(localStorage.getItem("admin") === "true"){
    openAdmin();
  }
});

/* ================= SETS ================= */
async function loadSetAdmin(setId){

  const box = document.getElementById("adminContent");
  box.innerHTML = "Cargando cartas...";

  const res = await fetch(API_CARDS + setId);
  const json = await res.json();

  renderAdminFast(json.data);
}

/* ================= STOCK FRONT ================= */
async function loadAllStock(){

  const ids = Object.keys(inventory).filter(i=>inventory[i].stock);

  let grouped = {};

  ids.forEach(id=>{
    const inv = inventory[id];
    const c = cardCache[id];
    if(!c) return;

    if(!grouped[c.set]) grouped[c.set] = [];

    grouped[c.set].push({
      id,
      name: c.name,
      img: c.img,
      price: inv.price || 0,
      qty: inv.qty || 1
    });
  });

  render(grouped);
}

/* ================= RENDER FRONT ================= */
function render(grouped){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  Object.keys(grouped).forEach(set=>{

    grid.innerHTML += `
      <div class="card" style="background:#1e3a8a;text-align:center;">
        <div>${set}</div>
      </div>
    `;

    grouped[set].forEach(c=>{

      grid.innerHTML += `
        <div class="card">
          <img src="${c.img}">
          <div>${c.name}</div>
          <div>$${c.price}</div>
          <button onclick="addToCart('${c.id}')">Agregar</button>
        </div>
      `;
    });

  });
}

/* ================= CART ================= */
function addToCart(id){

  const inv = inventory[id];
  const c = cardCache[id];

  if(!inv || !c) return;

  const ex = cart.find(i=>i.id===id);

  if(ex){
    ex.qty++;
  }else{
    cart.push({
      id,
      name:c.name,
      price:inv.price || 0,
      qty:1
    });
  }

  saveCart();
  updateCart();
  document.getElementById("cartPanel").style.right="-350px";
}

function updateCart(){

  let total = 0;

  document.getElementById("cartCount").innerText =
    cart.reduce((a,b)=>a+b.qty,0);

  const box = document.getElementById("cartItems");
  box.innerHTML = "";

  cart.forEach(i=>{
    total += i.qty*i.price;
    box.innerHTML += `
      <div style="display:flex;justify-content:space-between;">
        <span>${i.name} x${i.qty}</span>
        <span>$${i.qty*i.price}</span>
      </div>
    `;
  });

  document.getElementById("cartTotal").innerText =
    "Total: $" + total;
}

/* ================= CART UI ================= */
function toggleCart(){
  const p=document.getElementById("cartPanel");
  p.style.right = p.style.right==="0px"?"-350px":"0px";
}

/* ================= CHECKOUT ================= */
function checkout(){

  let text="Pedido:%0A";
  let total=0;

  cart.forEach(i=>{
    total+=i.qty*i.price;
    text+=`- ${i.name} x${i.qty} = $${i.qty*i.price}%0A`;
  });

  text+=`%0ATotal: $${total}`;

  window.open("https://wa.me/57TU_NUMERO?text="+encodeURIComponent(text));

  cart=[];
  saveCart();
  updateCart();
}

/* ================= ADMIN ================= */
function openLogin(){
  document.getElementById("loginOverlay").style.display="flex";
}

function login(){
  if(document.getElementById("pass").value==="1234"){
    localStorage.setItem("admin","true");
    document.getElementById("loginOverlay").style.display="none";
    openAdmin();
  }
}

function openAdmin(){
  document.getElementById("adminPanel").style.right="0px";
 async function loadGlobalAdmin(){

  const box = document.getElementById("adminContent");
  box.innerHTML = "";

  box.innerHTML = `<h3>Selecciona un set para cargar cartas</h3>`;

  const select = document.createElement("select");

  select.innerHTML = setsData.map(s=>
    `<option value="${s.id}">${s.name}</option>`
  ).join("");

  select.onchange = ()=> loadSetAdmin(select.value);

  box.appendChild(select);
}
}

/* ================= V11 ADMIN GLOBAL ================= */
async function loadGlobalAdmin(){

  const box=document.getElementById("adminContent");
  box.innerHTML="Cargando...";

  let all=[];

  for(const s of setsData){
    try{
      const r=await fetch(API_CARDS+s.id);
      const j=await r.json();

      j.data.forEach(c=>{
        all.push({
          id:c.id,
          name:c.name,
          img:c.images.small,
          set:c.set.name
        });
      });

    }catch(e){}
  }

  globalCards=all;

  renderAdmin(all);
}

function renderAdmin(cards){

  const box=document.getElementById("adminContent");
  box.innerHTML="";

  box.innerHTML+=`
    <input placeholder="Buscar..."
      oninput="filterAdmin(this.value)"
      style="width:100%;padding:8px;">
  `;

  cards.forEach(c=>{

    const inv=inventory[c.id]||{stock:false,price:0};

    box.innerHTML+=`
      <div style="background:#1e293b;margin:10px 0;padding:8px;border-radius:10px;">

        <img src="${c.img}" width="70">

        <div>${c.name}</div>
        <div style="font-size:12px;">${c.set}</div>

        <label>
          <input type="checkbox"
            ${inv.stock?"checked":""}
            onchange="toggleStock('${c.id}','${c.name}','${c.img}','${c.set}')">
          Stock
        </label>

        <input type="number"
          value="${inv.price||0}"
          onchange="setPrice('${c.id}',this.value)"
          style="width:100%;">

      </div>
    `;
  });
}

function filterAdmin(q){
  renderAdmin(globalCards.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())));
}

function toggleStock(id,name,img,set){

  if(!inventory[id]){
    inventory[id]={stock:false,price:0,qty:1,set};
  }

  inventory[id].stock=!inventory[id].stock;

  cardCache[id]={name,img,set,logo:""};

  saveInventory();
}

function setPrice(id,p){

  if(!inventory[id]){
    inventory[id]={stock:false,price:0,qty:1};
  }

  inventory[id].price=parseFloat(p)||0;

  saveInventory();
}

function logoutAdmin(){
  localStorage.removeItem("admin");
  document.getElementById("adminPanel").style.right="-450px";
}

</script>

</body>
</html>
