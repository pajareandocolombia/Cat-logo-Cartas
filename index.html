<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda PRO v4 Admin + Inventario</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* BANNER */
.banner{
  background:linear-gradient(90deg,#1e3a8a,#0ea5e9);
  padding:18px;
  text-align:center;
  font-weight:bold;
}

/* MENU */
.menu{
  display:flex;
  flex-wrap:wrap;
  background:#111827;
}

.menu button{
  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* SECCIONES */
.section{display:none;padding:20px;}
.active{display:block;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
}

.card img{width:100%;border-radius:8px;}

button.add{
  width:100%;
  margin-top:5px;
  padding:6px;
}

/* SEARCH */
.searchBar{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
}

/* ADMIN PANEL */
#adminPanel{
  position:fixed;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  width:400px;
  background:#111827;
  padding:15px;
  border:2px solid #0ea5e9;
  display:none;
  z-index:999;
}

#adminPanel input, #adminPanel select{
  width:100%;
  margin-bottom:8px;
  padding:6px;
}
</style>
</head>

<body>

<div class="banner">
  🧩 Tienda PRO v4 - Admin + Inventario + Search
</div>

<!-- SEARCH GLOBAL -->
<div style="padding:10px;">
  <input class="searchBar" id="search" placeholder="🔎 Buscar productos tipo Amazon..." oninput="globalSearch()">
</div>

<!-- MENU -->
<div class="menu">
  <button onclick="openTab('pokemon')">Pokémon</button>
  <button onclick="openTab('juegos')">🎮 Juegos</button>
  <button onclick="openTab('jet')">Jet</button>
  <button onclick="openTab('monedas')">Monedas</button>
</div>

<!-- POKEMON -->
<div id="pokemon" class="section active">
  <h2>Pokémon</h2>
  <div id="pokemonGrid" class="grid"></div>
</div>

<!-- JUEGOS -->
<div id="juegos" class="section">
  <h2>Juegos</h2>
  <div id="gamesGrid" class="grid"></div>
</div>

<!-- OTROS -->
<div id="jet" class="section"><h2>Jet</h2></div>
<div id="monedas" class="section"><h2>Monedas</h2></div>

<!-- ADMIN PANEL (OCULTO) -->
<div id="adminPanel">
  <h3>🔐 ADMIN PANEL</h3>

  <input id="pName" placeholder="Nombre">
  <input id="pPrice" placeholder="Precio">
  <input id="pStock" placeholder="Stock">
  <select id="pCat">
    <option value="pokemon">Pokémon</option>
    <option value="games">Juegos</option>
  </select>

  <button onclick="createProduct()">Crear Producto</button>
  <button onclick="closeAdmin()">Cerrar</button>
</div>

<script>

/* ====== DATA ====== */
let products = JSON.parse(localStorage.getItem("products")) || [
  {id:1,name:"Charizard",price:50,stock:3,cat:"pokemon",active:true},
  {id:2,name:"Pikachu V",price:20,stock:0,cat:"pokemon",active:true},
  {id:3,name:"Zelda TOTK",price:60,stock:5,cat:"games",active:true}
];

/* ====== NAV ====== */
function openTab(tab){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

/* ====== RENDER ====== */
function render(){

  localStorage.setItem("products", JSON.stringify(products));

  const pokemonGrid = document.getElementById("pokemonGrid");
  const gamesGrid = document.getElementById("gamesGrid");

  pokemonGrid.innerHTML = "";
  gamesGrid.innerHTML = "";

  products.forEach(p => {

    if(!p.active || p.stock <= 0) return; // 🔥 SOLO STOCK DISPONIBLE

    const card = `
      <div class="card">
        <h4>${p.name}</h4>
        <p>$${p.price}</p>
        <p>Stock: ${p.stock}</p>
        <button onclick="buy(${p.id})">Agregar</button>

        <button onclick="toggleProduct(${p.id})">
          ${p.active ? "Desactivar" : "Activar"}
        </button>
      </div>
    `;

    if(p.cat === "pokemon") pokemonGrid.innerHTML += card;
    if(p.cat === "games") gamesGrid.innerHTML += card;
  });
}

/* ====== BUY ====== */
function buy(id){
  let p = products.find(x=>x.id===id);

  if(p.stock <= 0) return alert("Sin stock");

  p.stock -= 1;
  render();
}

/* ====== ADMIN ====== */
function openAdmin(){
  document.getElementById("adminPanel").style.display="block";
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display="none";
}

/* CTRL + SHIFT + A */
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.shiftKey && e.key==="A"){
    openAdmin();
  }
});

function createProduct(){

  const name = document.getElementById("pName").value;
  const price = parseFloat(document.getElementById("pPrice").value);
  const stock = parseInt(document.getElementById("pStock").value);
  const cat = document.getElementById("pCat").value;

  products.push({
    id:Date.now(),
    name,price,stock,cat,active:true
  });

  render();
  closeAdmin();
}

/* ====== TOGGLE PRODUCT ====== */
function toggleProduct(id){
  let p = products.find(x=>x.id===id);
  p.active = !p.active;
  render();
}

/* ====== GLOBAL SEARCH ====== */
function globalSearch(){

  const q = document.getElementById("search").value.toLowerCase();

  document.querySelectorAll(".card").forEach(card=>{
    const text = card.innerText.toLowerCase();
    card.style.display = text.includes(q) ? "block" : "none";
  });
}

/* INIT */
render();

</script>

</body>
</html>
