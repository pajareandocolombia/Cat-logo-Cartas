<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V10.2 🛒</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{background:#1e3a8a;padding:10px;display:flex;justify-content:space-between;align-items:center;}
.admin-btn{background:#f59e0b;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;}

.search{padding:10px;background:#111827;}
.search input{width:100%;padding:8px;border-radius:6px;border:none;}

.container{display:flex;}
.main{flex:1;padding:10px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
  transition:0.25s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card img{
  width:100%;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.15);
}

button{
  width:100%;
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* BADGES */
.badge{
  position:absolute;
  top:6px;
  left:6px;
  padding:3px 6px;
  font-size:10px;
  border-radius:6px;
}
.badge.green{background:#22c55e;}
.badge.red{background:#ef4444;}

/* CART */
#cartFloating{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
  z-index:9999;
}

#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:300px;
  height:100%;
  background:#020617;
  padding:10px;
  transition:0.25s;
  z-index:9999;
}

/* ADMIN */
#adminPanel{
position:fixed;
top:0;
right:-400px;
width:400px;
height:100%;
background:#020617;
overflow:auto;
padding:10px;
transition:0.3s;
z-index:9999;
}

/* LOGIN */
#loginOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
}

#loginBox{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:280px;
}

#loginBox input{
  width:100%;
  padding:8px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
  <div>🃏 Tienda Pokémon PRO V10.2</div>
  <button class="admin-btn" onclick="openLogin()">Admin</button>
</header>

<div class="search">
  <input id="search" placeholder="Buscar carta..." oninput="searchCards()">
</div>

<div class="container">
  <div class="main">
    <h3 id="title">Cargando...</h3>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- CART -->
<div id="cartFloating" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>

<div id="cartPanel">
  <h3>🛒 Carrito</h3>
  <div id="cartItems"></div>
  <h4 id="cartTotal">Total: $0</h4>
  <button onclick="checkout()">Comprar</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <h2>🛠️ Admin</h2>
  <button onclick="logoutAdmin()" style="background:#ef4444;">Logout</button>
  <div id="adminContent"></div>
</div>

<!-- LOGIN -->
<div id="loginOverlay">
  <div id="loginBox">
    <h3>🔐 Admin Login</h3>
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<script>

/* ================= SAFE INIT ================= */
let inventory = JSON.parse(localStorage.getItem("inventory") || "{}");
let cardCache = JSON.parse(localStorage.getItem("cardCache") || "{}");
let cart = JSON.parse(localStorage.getItem("cart") || "[]");
let setsData = [];

/* ================= SAVE HELPERS ================= */
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function saveInventory(){
  localStorage.setItem("inventory", JSON.stringify(inventory));
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async ()=>{
  await loadSets();
  loadAllStock();
  updateCart();

  if(localStorage.getItem("admin") === "true"){
    openAdmin();
  }
});

/* ================= API ================= */
const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_SET_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

async function loadSets(){
  try{
    const r = await fetch(API_SETS);
    const j = await r.json();
    setsData = j.data || [];
  }catch(e){
    setsData = [];
  }
}

/* ================= STOCK ================= */
async function loadAllStock(){

  const ids = Object.keys(inventory).filter(i=>inventory[i].stock);

  if(ids.length === 0){
    document.getElementById("grid").innerHTML = "<h3>No hay stock</h3>";
    return;
  }

  let grouped = {};

  ids.forEach(id=>{
    const inv = inventory[id];
    const cache = cardCache[id];

    if(!cache) return;

    if(!grouped[cache.set]) grouped[cache.set] = [];

    grouped[cache.set].push({
      id,
      name: cache.name,
      img: cache.img,
      qty: inv.qty || 1,
      price: inv.price || 0,
      logo: cache.logo
    });
  });

  render(grouped);
}

/* ================= RENDER ================= */
function render(grouped){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  Object.keys(grouped).forEach(set=>{

    const first = grouped[set][0];

    grid.innerHTML += `
      <div class="card" style="background:#1e3a8a;text-align:center;">
        ${first.logo ? `<img src="${first.logo}" style="width:60px;">` : ""}
        <div>${set}</div>
      </div>
    `;

    grouped[set].forEach(c=>{

      const badge = c.qty <= 2
        ? `<div class="badge red">Últimas</div>`
        : `<div class="badge green">OK</div>`;

      grid.innerHTML += `
        <div class="card">
          ${badge}
          <img src="${c.img}">
          <div>${c.name}</div>
          <div>$${c.price}</div>
          <button onclick="addToCart('${c.id}')">Agregar</button>
        </div>
      `;
    });

  });
}

/* ================= CART (FIX FINAL ROBUSTO) ================= */
function addToCart(id){

  const inv = inventory[id];
  const data = cardCache[id];
  if(!inv || !data) return;

  const existing = cart.find(i=>i.id===id);

  if(existing){
    existing.qty++;
  }else{
    cart.push({
      id,
      name: data.name,
      price: inv.price || 0,
      qty: 1
    });
  }

  saveCart();
  updateCart();

  document.getElementById("cartPanel").style.right = "-350px";
}

function updateCart(){

  const totalQty = cart.reduce((a,b)=>a+b.qty,0);
  const totalPrice = cart.reduce((a,b)=>a+b.qty*b.price,0);

  document.getElementById("cartCount").innerText = totalQty;

  const box = document.getElementById("cartItems");
  box.innerHTML = "";

  cart.forEach(i=>{
    box.innerHTML += `
      <div style="display:flex;justify-content:space-between;">
        <span>${i.name} x${i.qty}</span>
        <span>$${i.qty*i.price}</span>
      </div>
    `;
  });

  document.getElementById("cartTotal").innerText =
    "Total: $" + totalPrice;
}

/* ================= CART UI ================= */
function toggleCart(){
  const p = document.getElementById("cartPanel");
  p.style.right = p.style.right === "0px" ? "-350px" : "0px";
}

/* ================= CHECKOUT ================= */
function checkout(){

  let text = "🛒 Pedido:%0A";
  let total = 0;

  cart.forEach(i=>{
    text += `- ${i.name} x${i.qty} = $${i.qty*i.price}%0A`;
    total += i.qty*i.price;
  });

  text += `%0ATotal: $${total}`;

  window.open("https://wa.me/57TU_NUMERO?text="+encodeURIComponent(text));

  cart = [];
  saveCart();
  updateCart();
}

/* ================= ADMIN LOGIN ================= */
function openLogin(){
  document.getElementById("loginOverlay").style.display = "flex";
}

function login(){
  const p = document.getElementById("pass").value;

  if(p === "1234"){
    localStorage.setItem("admin","true");
    document.getElementById("loginOverlay").style.display = "none";
    openAdmin();
  }
}

function openAdmin(){
  document.getElementById("adminPanel").style.right = "0px";
  document.getElementById("adminContent").innerHTML =
    "<p>Panel activo</p>";
}

function logoutAdmin(){
  localStorage.removeItem("admin");
  document.getElementById("adminPanel").style.right = "-400px";
}

</script>

</body>
</html>
