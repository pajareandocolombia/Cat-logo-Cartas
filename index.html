<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V8.4</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{background:#1e3a8a;padding:10px;display:flex;justify-content:space-between;}
.admin-btn{background:#f59e0b;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;}
.search{padding:10px;background:#111827;position:relative;}
.search input{width:100%;padding:8px;border-radius:6px;border:none;}
.suggestions{position:absolute;top:45px;left:10px;right:10px;background:#1e293b;max-height:200px;overflow:auto;}
.container{display:flex;}
.sets{width:220px;height:100vh;overflow:auto;background:#111827;padding:8px;}
.set{background:#1e293b;padding:6px;margin-bottom:6px;border-radius:6px;cursor:pointer;font-size:12px;}
.set img{width:100%;}
.main{flex:1;padding:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.card{background:#1e293b;padding:8px;border-radius:10px;}
.card img{width:100%;}
button{width:100%;margin-top:5px;padding:6px;border:none;border-radius:6px;background:#22c55e;color:white;}
.global-btn{width:100%;padding:8px;margin-bottom:10px;background:#3b82f6;border:none;border-radius:6px;color:white;}

#adminPanel{
position:fixed;top:0;right:-400px;width:400px;height:100%;
background:#020617;overflow:auto;padding:10px;transition:0.3s;
}
</style>
</head>

<body>

<header>
  <div>🃏 Tienda Pokémon PRO V8.4</div>
  <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</header>

<div class="search">
  <input id="search" placeholder="Buscar carta..." oninput="searchCards()">
  <div id="suggestions" class="suggestions"></div>
</div>

<div class="container">

<div class="sets" id="sets">
  <button class="global-btn" onclick="loadAllStock()">🟢 Ver todo el stock</button>
</div>

<div class="main">
  <h3 id="title">Cargando...</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<div id="adminPanel">
  <h2>🛠️ Panel Admin</h2>
  <select id="adminSet" onchange="loadAdminSet()" style="width:100%;margin-bottom:10px;"></select>
  <div id="adminCards"></div>
</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARD = "https://api.pokemontcg.io/v2/cards/";

let inventory = {};
let allCards = [];
let loadedCards = {};

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {

  const saved = localStorage.getItem("inventory");
  inventory = saved ? JSON.parse(saved) : {};

  await loadSets();

  setTimeout(()=>{
    loadAllStock();
  },300);

});

/* ================= ADMIN ================= */
function loginAdmin(){
  const pass = prompt("Contraseña admin:");
  if(pass === "1234"){
    document.getElementById("adminPanel").style.right = "0px";
    loadAdminSets();
  }
}

/* ================= SETS MENU ================= */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  const sets = json.data.sort((a,b)=>
    new Date(b.releaseDate) - new Date(a.releaseDate)
  );

  const box = document.getElementById("sets");

  sets.forEach(s=>{
    const div = document.createElement("div");
    div.className = "set";

    div.innerHTML = `
      <img src="${s.images.logo}">
      <div>${s.name}</div>
    `;

    div.onclick = ()=> loadSet(s.id, s.name);

    box.appendChild(div);
  });
}

/* ================= 🔥 LOAD STOCK ================= */
async function loadAllStock(){

  document.getElementById("title").innerText =
    "Todas las cartas en stock";

  const saved = localStorage.getItem("inventory");
  inventory = saved ? JSON.parse(saved) : {};

  const ids = Object.keys(inventory);

  if(ids.length === 0){
    document.getElementById("grid").innerHTML =
      "<h3>No hay cartas en stock (activa desde admin)</h3>";
    return;
  }

  let grouped = {};

  for(const id of ids){

    if(!loadedCards[id]){
      const res = await fetch(API_CARD + id);
      const json = await res.json();
      loadedCards[id] = json.data;
    }

    const c = loadedCards[id];
    const inv = inventory[id];

    if(inv.stock && inv.qty > 0){

      const setName = c.set.name;
      const releaseDate = c.set.releaseDate || "2000-01-01";

      if(!grouped[setName]){
        grouped[setName] = {
          releaseDate,
          cards:[]
        };
      }

      grouped[setName].cards.push({
        id:c.id,
        name:c.name,
        img:c.images.small,
        qty:inv.qty
      });
    }
  }

  let ordered = Object.keys(grouped).map(k=>({
    name:k,
    releaseDate:grouped[k].releaseDate,
    cards:grouped[k].cards
  }));

  ordered.sort((a,b)=>
    new Date(b.releaseDate) - new Date(a.releaseDate)
  );

  allCards = ordered.flatMap(s=>s.cards);

  renderGrouped(ordered);
}

/* ================= RENDER ================= */
function renderGrouped(sets){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  sets.forEach(set=>{

    grid.innerHTML += `
      <h3 style="grid-column:1/-1;border-bottom:1px solid #334155;">
        ${set.name}
      </h3>
    `;

    set.cards.forEach(c=>{
      grid.innerHTML += `
        <div class="card">
          <img src="${c.img}">
          <div>${c.name}</div>
          <div>Stock: ${c.qty}</div>
          <button onclick="buy('${c.name}')">Comprar</button>
        </div>
      `;
    });

  });
}

/* ================= FILTER SET ================= */
async function loadSet(setId, name){

  document.getElementById("title").innerText = name;

  const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${setId}`);
  const json = await res.json();

  const filtered = json.data
    .filter(c => inventory[c.id]?.stock)
    .map(c=>({
      id:c.id,
      name:c.name,
      img:c.images.small,
      qty:inventory[c.id]?.qty || 1
    }));

  render(filtered);
}

function render(cards){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cards.forEach(c=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${c.img}">
        <div>${c.name}</div>
        <div>Stock: ${c.qty}</div>
        <button onclick="buy('${c.name}')">Comprar</button>
      </div>
    `;
  });
}

/* ================= SEARCH ================= */
function searchCards(){

  const q = document.getElementById("search").value.toLowerCase();
  const box = document.getElementById("suggestions");

  if(q.length === 0){
    box.innerHTML = "";
    loadAllStock();
    return;
  }

  const matches = allCards.filter(c=>
    c.name.toLowerCase().includes(q)
  );

  box.innerHTML = matches.slice(0,8).map(m=>
    `<div onclick="selectSearch('${m.name}')">${m.name}</div>`
  ).join("");

  render(matches);
}

function selectSearch(name){
  document.getElementById("search").value="";
  document.getElementById("suggestions").innerHTML="";
  render(allCards.filter(c=>c.name===name));
}

/* ================= ADMIN ================= */
async function loadAdminSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  document.getElementById("adminSet").innerHTML =
    json.data.map(s=>`<option value="${s.id}">${s.name}</option>`).join("");

  loadAdminSet();
}

async function loadAdminSet(){

  const setId = document.getElementById("adminSet").value;

  const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${setId}`);
  const json = await res.json();

  const box = document.getElementById("adminCards");
  box.innerHTML = "";

  json.data.forEach(c=>{

    const inv = inventory[c.id] || {stock:false, qty:1};

    box.innerHTML += `
      <div style="background:#1e293b;margin-bottom:8px;padding:6px;border-radius:6px;">
        <img src="${c.images.small}" style="width:80px">
        <div>${c.name}</div>

        <label>
          <input type="checkbox"
            ${inv.stock ? "checked" : ""}
            onchange="toggleStock('${c.id}')">
          En stock
        </label>

        <input type="number" value="${inv.qty}"
          onchange="changeQty('${c.id}', this.value)"
          style="width:60px">
      </div>
    `;
  });
}

function toggleStock(id){
  if(!inventory[id]) inventory[id]={stock:false,qty:1};
  inventory[id].stock=!inventory[id].stock;
  saveInventory();
}

function changeQty(id,qty){
  if(!inventory[id]) inventory[id]={stock:true,qty:1};
  inventory[id].qty=parseInt(qty)||1;
  saveInventory();
}

function saveInventory(){

  Object.keys(inventory).forEach(id=>{
    if(!inventory[id].stock){
      delete inventory[id];
    }
  });

  localStorage.setItem("inventory", JSON.stringify(inventory));

  loadAllStock();
}

/* ================= BUY ================= */
function buy(name){
  window.open("https://wa.me/57TU_NUMERO?text=Quiero%20"+encodeURIComponent(name));
}

</script>

</body>
</html>
