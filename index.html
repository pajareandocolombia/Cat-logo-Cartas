<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO Catalogo</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:#1e3a8a;
  padding:15px;
  text-align:center;
}

/* CONTAINER */
.container{
  display:flex;
}

/* LEFT PANEL (SETS) */
.sets{
  width:25%;
  height:100vh;
  overflow:auto;
  background:#111827;
  padding:10px;
}

.set{
  cursor:pointer;
  margin-bottom:10px;
  background:#1e293b;
  padding:8px;
  border-radius:8px;
}

.set img{
  width:100%;
  border-radius:6px;
}

/* MAIN */
.main{
  width:75%;
  padding:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
}

.card img{
  width:100%;
}

/* ADMIN MODE */
.admin{
  border:2px solid #f59e0b;
}

button{
  width:100%;
  margin-top:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
🧩 Pokémon TCG PRO Catalog
</header>

<div class="container">

<!-- SETS -->
<div class="sets" id="sets"></div>

<!-- CARDS -->
<div class="main">
  <h3 id="title">Selecciona una colección</h3>
  <div id="grid" class="grid"></div>
</div>

</div>

<script>

const API_SETS = "https://api.pokemontcg.io/v2/sets";
const API_CARDS = "https://api.pokemontcg.io/v2/cards?q=set.id:";

let admin = false;

let inventory = JSON.parse(localStorage.getItem("inventory")) || {};

/* LOGIN ADMIN */
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.shiftKey && e.key==="A"){
    let pass = prompt("Admin:");
    if(pass==="1234"){
      admin = true;
      alert("Admin activado");
    }
  }
});

/* LOAD SETS */
async function loadSets(){

  const res = await fetch(API_SETS);
  const json = await res.json();

  const sets = json.data;

  const box = document.getElementById("sets");
  box.innerHTML = "";

  sets.forEach(s=>{

    box.innerHTML += `
      <div class="set" onclick="loadCards('${s.id}','${s.name}')">
        <img src="${s.images.logo}">
        <strong>${s.name}</strong>
      </div>
    `;
  });
}

/* LOAD CARDS */
async function loadCards(setId, name){

  document.getElementById("title").innerText = name;

  const res = await fetch(API_CARDS + setId);
  const json = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  json.data.forEach(c=>{

    const id = c.id;

    if(inventory[id] === undefined){
      inventory[id] = {stock:0};
    }

    const stock = inventory[id].stock;

    grid.innerHTML += `
      <div class="card ${admin ? 'admin':''}">
        <img src="${c.images.small}">
        <p>${c.name}</p>
        <p>Stock: ${stock}</p>

        ${admin ? `
          <button onclick="addStock('${id}')">+ Stock</button>
          <button onclick="removeStock('${id}')">- Stock</button>
        ` : ""}
      </div>
    `;
  });

  save();
}

/* STOCK */
function addStock(id){
  inventory[id].stock++;
  renderCurrent();
}

function removeStock(id){
  if(inventory[id].stock>0)
    inventory[id].stock--;
  renderCurrent();
}

function renderCurrent(){
  save();
  location.reload();
}

/* SAVE */
function save(){
  localStorage.setItem("inventory", JSON.stringify(inventory));
}

/* INIT */
loadSets();

</script>

</body>
</html>
