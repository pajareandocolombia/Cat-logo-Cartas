<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pokémon PRO V10</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{background:#1e3a8a;padding:10px;display:flex;justify-content:space-between;}
.admin-btn{background:#f59e0b;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;}
.search{padding:10px;background:#111827;}
.search input{width:100%;padding:8px;border-radius:6px;border:none;}
.container{display:flex;}
.sets{width:220px;height:100vh;overflow:auto;background:#111827;padding:8px;}
.main{flex:1;padding:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.card{background:#1e293b;padding:8px;border-radius:10px;}
.card img{width:100%;}
button{width:100%;margin-top:5px;padding:6px;border:none;border-radius:6px;background:#22c55e;color:white;}
.global-btn{width:100%;padding:8px;margin-bottom:10px;background:#3b82f6;border:none;border-radius:6px;color:white;}

#adminPanel{
position:fixed;top:0;right:-400px;width:350px;height:100%;
background:#020617;overflow:auto;padding:10px;transition:0.3s;
}
</style>
</head>

<body>

<header>
  <div>🃏 Tienda Pokémon PRO V10</div>
  <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</header>

<div class="search">
  <input id="search" placeholder="Buscar carta..." oninput="searchCards()">
</div>

<div class="container">

<div class="sets">
  <button class="global-btn" onclick="loadAllStock()">🟢 Ver todo el stock</button>
</div>

<div class="main">
  <h3 id="title">Cargando...</h3>
  <div class="grid" id="grid"></div>
</div>

</div>

<div id="adminPanel">
  <h2>🛠️ Admin rápido</h2>
  <input placeholder="Buscar carta..." oninput="adminSearch(this.value)">
  <div id="adminCards"></div>
</div>

<script>

let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let cache = JSON.parse(localStorage.getItem("cardsCache")) || {};

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", () => {
  loadAllStock();
});

/* ================= BUILD CACHE ================= */
async function buildCache(){

  const res = await fetch("https://api.pokemontcg.io/v2/cards?pageSize=250");
  const json = await res.json();

  let newCache = {};

  json.data.forEach(c=>{
    newCache[c.id] = {
      name: c.name,
      img: c.images.small,
      set: c.set.name,
      date: c.set.releaseDate || "2000-01-01"
    };
  });

  localStorage.setItem("cardsCache", JSON.stringify(newCache));

  alert("Cache creada correctamente");
}

/* ================= LOAD STOCK ================= */
function loadAllStock(){

  document.getElementById("title").innerText =
    "Todas las cartas en stock";

  inventory = JSON.parse(localStorage.getItem("inventory")) || {};
  cache = JSON.parse(localStorage.getItem("cardsCache")) || {};

  let grouped = {};

  Object.keys(inventory).forEach(id=>{

    const inv = inventory[id];
    const c = cache[id];

    if(!c || !inv.stock || inv.qty <= 0) return;

    if(!grouped[c.set]){
      grouped[c.set] = {date:c.date, cards:[]};
    }

    grouped[c.set].cards.push({
      name:c.name,
      img:c.img,
      qty:inv.qty
    });

  });

  let ordered = Object.keys(grouped).map(k=>({
    name:k,
    date:grouped[k].date,
    cards:grouped[k].cards
  }));

  ordered.sort((a,b)=> new Date(b.date) - new Date(a.date));

  renderGrouped(ordered);
}

/* ================= RENDER ================= */
function renderGrouped(sets){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  if(sets.length === 0){
    grid.innerHTML = "<h3>No hay cartas en stock</h3>";
    return;
  }

  sets.forEach(set=>{

    grid.innerHTML += `<h3 style="grid-column:1/-1">${set.name}</h3>`;

    set.cards.forEach(c=>{
      grid.innerHTML += `
        <div class="card">
          <img src="${c.img}">
          <div>${c.name}</div>
          <div>Stock: ${c.qty}</div>
        </div>
      `;
    });

  });
}

/* ================= SEARCH ================= */
function searchCards(){

  const q = document.getElementById("search").value.toLowerCase();

  if(!q){
    loadAllStock();
    return;
  }

  let results = [];

  Object.keys(inventory).forEach(id=>{
    const c = cache[id];
    if(c && c.name.toLowerCase().includes(q)){
      results.push({
        name:c.name,
        img:c.img,
        qty:inventory[id].qty
      });
    }
  });

  render(results);
}

/* ================= ADMIN ================= */
function loginAdmin(){
  if(prompt("Clave") === "1234"){
    document.getElementById("adminPanel").style.right = "0px";
    loadAdmin();
  }
}

function loadAdmin(){

  const box = document.getElementById("adminCards");
  box.innerHTML = "";

  Object.keys(cache).slice(0,200).forEach(id=>{

    const c = cache[id];
    const inv = inventory[id] || {stock:false, qty:1};

    box.innerHTML += `
      <div style="margin-bottom:8px;">
        <img src="${c.img}" width="60">
        <div>${c.name}</div>

        <input type="checkbox"
          ${inv.stock ? "checked":""}
          onchange="toggleStock('${id}')"> Stock

        <input type="number" value="${inv.qty}"
          onchange="changeQty('${id}',this.value)">
      </div>
    `;
  });
}

function adminSearch(q){

  const box = document.getElementById("adminCards");
  box.innerHTML = "";

  Object.keys(cache).forEach(id=>{

    const c = cache[id];

    if(!c.name.toLowerCase().includes(q.toLowerCase())) return;

    const inv = inventory[id] || {stock:false, qty:1};

    box.innerHTML += `
      <div>
        <img src="${c.img}" width="60">
        <div>${c.name}</div>

        <input type="checkbox"
          ${inv.stock ? "checked":""}
          onchange="toggleStock('${id}')">

        <input type="number" value="${inv.qty}"
          onchange="changeQty('${id}',this.value)">
      </div>
    `;
  });
}

function toggleStock(id){
  if(!inventory[id]) inventory[id]={stock:false,qty:1};
  inventory[id].stock=!inventory[id].stock;
  save();
}

function changeQty(id,q){
  if(!inventory[id]) inventory[id]={stock:true,qty:1};
  inventory[id].qty=parseInt(q)||1;
  save();
}

function save(){
  localStorage.setItem("inventory", JSON.stringify(inventory));
  loadAllStock();
}

</script>

</body>
</html>
