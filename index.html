<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda de Cartas</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

header{
  background:#1e3a8a;
  padding:20px;
  text-align:center;
  font-size:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}

button{
  width:100%;
  padding:8px;
  margin-top:5px;
  cursor:pointer;
}

/* ADMIN */
#adminPanel{
  position:fixed;
  top:20px;
  right:20px;
  background:#111827;
  padding:10px;
  border:1px solid #3b82f6;
  display:none;
}
</style>
</head>

<body>

<header>
🃏 Tienda de Cartas Coleccionables
</header>

<div id="grid" class="grid"></div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>Admin</h3>
<input id="name" placeholder="Nombre"><br><br>
<input id="price" placeholder="Precio"><br><br>
<button onclick="addCard()">Agregar</button>
</div>

<script>

let isAdmin = false;

let cards = [
  {id:1,name:"Charizard EX",price:50000,stock:3},
  {id:2,name:"Pikachu V",price:20000,stock:5}
];

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  cards.forEach(c=>{
    if(c.stock <= 0) return;

    grid.innerHTML += `
      <div class="card">
        <h3>${c.name}</h3>
        <p>$${c.price}</p>
        <p>Stock: ${c.stock}</p>

        <button onclick="buy(${c.id})">Comprar</button>

        ${isAdmin ? `<button onclick="remove(${c.id})">Eliminar</button>` : ""}
      </div>
    `;
  });
}

function buy(id){
  let c = cards.find(x=>x.id===id);

  if(c.stock <= 0) return;

  c.stock--;

  window.open(
    `https://wa.me/57TU_NUMERO?text=Quiero%20${c.name}`
  );

  render();
}

/* ADMIN */
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.shiftKey && e.key==="A"){
    let pass = prompt("Password admin:");

    if(pass==="1234"){
      isAdmin = true;
      document.getElementById("adminPanel").style.display="block";
      render();
    }
  }
});

function addCard(){
  cards.push({
    id:Date.now(),
    name:document.getElementById("name").value,
    price:document.getElementById("price").value,
    stock:3
  });

  render();
}

function remove(id){
  cards = cards.filter(x=>x.id!==id);
  render();
}

render();

</script>

</body>
</html>
